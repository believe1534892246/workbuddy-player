<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WorkBuddy 说明讲稿播放器</title>
  <style>
    :root { color-scheme: dark; --blue:#3b82f6; --ink:#f7fbff; --muted:#aebbd0; --line:#26344f; --bg:#070b14; --panel:#0c1324; }
    * { box-sizing: border-box; }
    html, body { height:100%; }
    body { margin:0; font-family:"Microsoft YaHei", Arial, sans-serif; color:var(--ink); background:radial-gradient(circle at top, #15213a 0, #070b14 46%, #03050a 100%); }
    main { height:100vh; padding:10px; display:grid; grid-template-columns:minmax(0, 1fr) 300px 340px; gap:10px; overflow:hidden; }
    .imageFrame { min-width:0; min-height:0; display:flex; align-items:center; justify-content:flex-start; background:#02040a; border:1px solid var(--line); border-radius:10px; padding:8px; box-shadow:0 24px 70px rgba(0,0,0,.42); }
    .imageFrame img { display:block; max-width:100%; max-height:100%; width:auto; height:auto; object-fit:contain; border-radius:4px; }
    .sidePanel { min-width:0; min-height:0; display:flex; flex-direction:column; gap:10px; background:rgba(8, 13, 25, .94); border:1px solid var(--line); border-radius:10px; padding:10px; box-shadow:0 18px 60px rgba(0,0,0,.34); }
    h1 { margin:0; font-size:18px; line-height:1.25; }
    .counter { color:var(--muted); font-size:13px; margin-top:4px; }
    .slideTitle { color:#dbe7ff; font-size:14px; line-height:1.45; }
    .panelSection { border:1px solid var(--line); border-radius:8px; background:rgba(13, 21, 39, .82); overflow:hidden; }
    .sectionHead { width:100%; display:flex; justify-content:space-between; align-items:center; gap:8px; border:0; border-bottom:1px solid var(--line); border-radius:0; background:#111a2e; padding:9px 10px; font-weight:700; text-align:left; }
    .sectionHead span:last-child { color:var(--muted); font-size:12px; }
    .sectionBody { display:flex; flex-direction:column; gap:10px; padding:10px; }
    .panelSection.collapsed .sectionBody { display:none; }
    .toolbar { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .toolbar .wide { grid-column:1 / -1; }
    button, select, input, textarea, label.toggle { border:1px solid var(--line); background:#111a2e; color:var(--ink); border-radius:7px; padding:8px 10px; font-size:14px; min-width:0; }
    textarea { resize:vertical; min-height:72px; line-height:1.55; font-family:inherit; }
    input::placeholder, textarea::placeholder { color:#6f7d95; }
    select { width:100%; }
    button.primary { background:var(--blue); color:#fff; border-color:var(--blue); }
    button.danger { background:#3a1420; border-color:#6d2637; color:#ffd6df; }
    button:disabled { opacity:.5; cursor:not-allowed; }
    label.toggle { display:inline-flex; gap:7px; align-items:center; cursor:pointer; user-select:none; }
    audio { width:100%; height:38px; }
    .hint { color:var(--muted); font-size:12px; line-height:1.55; }
    .agentStatus { color:#93c5fd; font-size:12px; min-height:18px; }
    .agentOutput { flex:1; min-height:110px; max-height:28vh; overflow:auto; white-space:pre-wrap; line-height:1.7; color:#eef6ff; background:rgba(0,0,0,.38); border:1px solid #1f2a42; border-radius:7px; padding:10px; font-size:14px; }
    .subtitleBar { min-width:0; min-height:0; overflow:auto; background:rgba(0,0,0,.82); border:1px solid #1f2a42; border-radius:10px; padding:12px; scrollbar-color:#33415f #070b14; }
    .subtitleTrack { display:flex; flex-direction:column; gap:10px; }
    .subtitleUnit { color:#7f8da6; line-height:1.75; font-size:15px; padding:8px 9px; border-radius:7px; transition:color .2s ease, background .2s ease, transform .2s ease; }
    .subtitleUnit.active { color:#fff; background:rgba(59,130,246,.24); transform:translateX(2px); box-shadow:inset 3px 0 0 var(--blue); }
    .subtitleUnit.en { color:#8aa3c7; }
    .subtitleUnit.en.active { color:#dbeafe; }
    .subtitleEmpty { color:#8ea0ba; line-height:1.8; text-align:center; padding-top:30px; }
    .hidden { display:none; }
    @media (max-width: 900px) {
      main { height:auto; min-height:100vh; grid-template-columns:1fr; overflow:auto; }
      .imageFrame { height:62vh; }
      .subtitleBar { min-height:260px; }
      .sidePanel { min-height:360px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="imageFrame"><img id="slideImage" alt=""></div>
    <div id="subtitleBar" class="subtitleBar">
      <div id="subtitleTrack" class="subtitleTrack"></div>
    </div>
    <aside class="sidePanel">
      <section id="controlSection" class="panelSection">
        <button id="toggleControls" class="sectionHead" type="button"><span>播放控制</span><span>收起</span></button>
        <div class="sectionBody">
          <h1>WorkBuddy 说明讲稿播放器</h1>
          <div id="counter" class="counter"></div>
          <div id="slideTitle" class="slideTitle"></div>
          <div class="toolbar">
            <select id="slideSelect" class="wide" title="选择图片"></select>
            <button id="prev">上一张</button>
            <button id="next">下一张</button>
            <button id="playPause" class="primary">播放</button>
            <button id="restart">从头播放</button>
          </div>
          <select id="voiceLang" title="语音切换">
            <option value="zh">中文语音</option>
            <option value="en">English Voice</option>
          </select>
          <audio id="audio" controls preload="metadata"></audio>
          <div class="toolbar">
            <label class="toggle"><input id="autoNext" type="checkbox" checked>连续播放</label>
            <label class="toggle"><input id="showZh" type="checkbox" checked>中文字幕</label>
            <label class="toggle"><input id="showEn" type="checkbox">英文字幕</label>
          </div>
        </div>
      </section>
      <section id="agentSection" class="panelSection collapsed">
        <button id="toggleAgent" class="sectionHead" type="button"><span>智能体对话</span><span>展开</span></button>
        <div class="sectionBody">
          <div class="hint">只解释当前显示页的内容，流式输出纯文字。API Key 仅保存在当前页面内存中，不写入文件。</div>
          <input id="tokenhubKey" type="password" autocomplete="off" placeholder="TokenHub API Key">
          <input id="tokenhubModel" type="text" value="hy3" placeholder="模型，例如 hy3">
          <textarea id="agentQuestion" placeholder="例如：请解释这一页的重点，适合新手听懂。"></textarea>
          <div class="toolbar">
            <button id="askAgent" class="primary">发送</button>
            <button id="stopAgent" class="danger" disabled>停止</button>
          </div>
          <div id="agentStatus" class="agentStatus"></div>
          <div id="agentOutput" class="agentOutput"></div>
        </div>
      </section>
    </aside>
  </main>
  <script>
    const slides = [{"id": 1, "title": "WorkBuddy 是什么", "image": "1-WorkBuddy 是什么.png", "zh": "大家好，我先带大家解决一个基础问题：WorkBuddy 到底是什么。\n\n大家可以把 WorkBuddy 理解成一个“能动手干活的 AI 工作台”。普通聊天机器人更多是在对话框里回答问题，你问一句，它答一句；但 WorkBuddy 的重点不是只给答案，而是围绕一个目标，帮你拆解步骤、读取材料、调用工具、生成文件，并把结果交付出来。\n\n图里第二格列了它能帮我们做的典型事情：文档处理、数据分析、内容创作、编程开发、自动化任务、连接外部工具、批量处理、资料整理和生成报告。也就是说，它不是一个单点工具，而是一个可以覆盖多种办公和生产力场景的入口。\n\n第三格是这页的关键：普通 AI 助手偏“回答”，WorkBuddy 偏“执行”。比如你说“帮我分析这个月销售情况”，普通 AI 可能会告诉你分析方法；而 WorkBuddy 更适合进一步读取 Excel、合并数据、生成图表、写出结论、输出报告，甚至沉淀成下次可复用的模板。\n\n第四格给出典型工作流：先明确目标与需求，再拆解任务与制定计划，接着收集资料与调用工具，然后执行任务与处理数据，最后生成结果、复盘总结、提出优化建议。这个流程非常重要，后面所有案例都可以套用这个逻辑。\n\n第五格强调文件能力。WorkBuddy 可以围绕 Word、Excel、PPT、PDF、图片、音频、视频、压缩包等材料工作。真实办公中，资料往往不是整齐地放在一个表格里，而是散落在不同格式里，WorkBuddy 的价值就是把这些材料串起来。\n\n第六格说明适合的人群：教师、学生、运营、新媒体、销售、客服、程序员、产品经理、跨境电商、门店督导等。只要工作中有明确任务、有材料、有输出要求，就可以尝试让 WorkBuddy 参与。\n\n第七格把 WorkBuddy 和腾讯云连接起来。WorkBuddy 是桌面入口和 Agent 编排器，腾讯云是能力底座。比如存储用 COS，识别用 OCR，音视频用 VOD、云直播、TRTC，语音识别用 ASR，翻译用 TMT，模型和知识能力可以结合 TokenHub、TI-ONE、VectorDB、知识引擎等。\n\n第八格是安全边界：不要把没有人工复核的合同、法律、财务、医疗结论直接交给 AI 定稿；不要让它无备份地批量删除、覆盖、迁移文件；不要让它直接发送高风险客户消息；不要绕过平台规则、登录权限和隐私边界。WorkBuddy 很强，但越强越要有边界。\n\n最后一格给出上手方法：准备材料，明确任务，启动执行。真正提高效率的关键不是一句“帮我做个报告”，而是明确目标、提供优质材料、合理规划步骤。", "en": "Hello everyone. Let us first solve the basic question: what exactly is WorkBuddy?\n\nYou can think of WorkBuddy as an AI workspace that can actually do work. A normal chatbot mostly answers questions inside a chat box. You ask one thing, it replies with one answer. WorkBuddy is different. It can start from a goal, break the work into steps, read materials, call tools, create files, and deliver usable results.\n\nThe second panel shows the typical jobs it can handle: document processing, data analysis, content creation, programming, automation, connecting external tools, batch processing, organizing materials, and generating reports. In other words, it is not a single-purpose tool. It is an entry point for many office and productivity workflows.\n\nThe third panel is the key point of this page: a normal AI assistant focuses on answering, while WorkBuddy focuses on planning and execution. If you say, \"Help me analyze this month's sales,\" a normal AI may only explain the analysis method. WorkBuddy is better suited to reading Excel files, merging data, generating charts, writing conclusions, exporting a report, and even turning the process into a reusable template.\n\nThe fourth panel gives a typical workflow. First clarify the goal and requirements. Then break down the task and make a plan. Next collect materials and call tools. Then execute the task and process the data. Finally generate results, review the work, and propose optimization suggestions. This workflow is important because all later cases can follow the same logic.\n\nThe fifth panel emphasizes file capability. WorkBuddy can work with Word, Excel, PowerPoint, PDF, images, audio, video, compressed files, and other materials. In real work, information is rarely stored neatly in a single table. It is scattered across many formats. WorkBuddy's value is to connect those materials into one workflow.\n\nThe sixth panel explains who can use it: teachers, students, operators, new media teams, salespeople, customer service teams, programmers, product managers, cross-border e-commerce teams, and store supervisors. If there is a clear task, materials, and an expected output, WorkBuddy can probably help.\n\nThe seventh panel connects WorkBuddy with Tencent Cloud. WorkBuddy is the desktop entry and agent orchestrator, while Tencent Cloud provides the capability foundation. For example, COS handles storage, OCR handles recognition, VOD, CSS, and TRTC handle audio and video, ASR handles speech recognition, TMT handles translation, and model or knowledge capabilities can be combined with TokenHub, TI-ONE, VectorDB, and Knowledge Engine.\n\nThe eighth panel is about safety boundaries. Do not let AI finalize contracts, legal opinions, financial conclusions, or medical conclusions without human review. Do not let it batch delete, overwrite, migrate, or rename files without backup. Do not let it directly send high-risk customer messages. Do not bypass platform rules, login permissions, or privacy boundaries. WorkBuddy is powerful, and the more powerful it is, the more clearly we need boundaries.\n\nThe last panel gives the way to start: prepare materials, clarify the task, and then execute. The key to real productivity is not saying \"help me make a report.\" It is clarifying the goal, providing good materials, and planning the steps properly.", "webp": "images/01.webp", "audioZh": "audio/zh/01.mp3", "audioEn": "audio/en/01.mp3"}, {"id": 2, "title": "官方资料地图", "image": "2-官方资料地图.png", "zh": "我们继续看，这一页讲“资料地图”。很多人学新工具时最大的问题不是不会用，而是不知道去哪里查最权威、最完整、最新的说明。WorkBuddy 也一样。产品能力、安装方式、权限说明、连接器、自动化、MCP 和计费信息都会更新，所以我们不能只依赖二手教程。\n\n图中第二格把资料分成两大类。第一类是 WorkBuddy 官方资料，主要用于了解产品本身怎么安装、怎么创建任务、怎么管理任务、怎么看结果、怎么设置权限、怎么使用 Skill、Connector、Automation 和 MCP。第二类是腾讯云官方资料，主要用于了解云产品、API、接入方式和企业级能力，比如 TokenHub、MCP 广场、COS、VOD、OCR、ASR、TMT、CloudBase、EdgeOne、VectorDB 等。\n\n第三格建议先收藏几个高频入口：Overview、中文文档、Quick Start、Windows 安装指南和 Mac 安装指南。对新手来说，先看 Overview 建立整体概念，再看 Quick Start 跑通第一个任务，最后按自己的系统安装客户端，是最稳的路径。\n\n第四格列了 WorkBuddy 核心功能文档。创建任务、任务管理、结果查看、权限模式、技能市场、连接器、自动化和 MCP 指南，这些不是可看可不看的内容，而是后续高效使用的基础。特别是权限模式和自动化文档，直接关系到数据安全和风险控制。\n\n第五格讲企业协作与集成。WorkBuddy 不是只能在本地单机使用，它可以通过企业微信、邮箱、腾讯文档、API、Webhook、Connector、MCP 等方式连接团队工作流。企业场景中，真正的价值往往不是“个人问答”，而是“团队资料和业务系统被 AI 合理调用”。\n\n第六格列出腾讯云资料入口。建议优先从 TokenHub 和 MCP 看起，因为它们决定了模型调用和工具接入的方式。之后再根据业务场景查具体产品：做文件存储查 COS，做视频查 VOD 和云直播，做语音转写查 ASR，做图片文字识别查 OCR，做翻译查 TMT，做应用部署查 CloudBase 和 EdgeOne。\n\n第七格把腾讯云产品按场景分类：存储与内容、音视频、AI 能力、开发与部署、大模型与知识、通信与触达。讲者可以提醒听众，不需要一次学完所有云产品，只要知道“遇到什么问题，去哪类产品里查”。\n\n第八格给出使用官方资料的方法：先明确目标，再查找文档，最后动手实践。不要为了学习而学习，要带着具体任务查资料。比如“我想把直播回放自动转写并生成复盘报告”，就需要查 VOD、ASR、COS、WorkBuddy 自动化和可能的企业微信通知。\n\n第九格是建议：收藏常用页面，关注更新动态，善用搜索，加入社区交流。官方资料是底座，社区文章可以作为案例参考，但涉及能力边界和动态信息时，以官方说明为准。", "en": "Let us continue with the resource map. When people learn a new tool, the biggest problem is often not that they cannot use it, but that they do not know where to find the most authoritative, complete, and up-to-date information. WorkBuddy is the same. Product capabilities, installation methods, permission settings, connectors, automation, MCP, and pricing may all change, so we should not rely only on second-hand tutorials.\n\nThe second panel divides the resources into two categories. The first category is WorkBuddy official resources. They explain how to install the product, create tasks, manage tasks, view results, configure permissions, and use Skills, Connectors, Automation, and MCP. The second category is Tencent Cloud official resources. They explain cloud products, APIs, integration methods, and enterprise capabilities such as TokenHub, MCP Marketplace, COS, VOD, OCR, ASR, TMT, CloudBase, EdgeOne, and VectorDB.\n\nThe third panel suggests collecting several high-frequency entry pages: Overview, Chinese documentation, Quick Start, Windows installation guide, and Mac installation guide. For beginners, the safest path is to read Overview first, run the first task through Quick Start, and then install the client that matches your system.\n\nThe fourth panel lists core WorkBuddy documentation: creating tasks, task management, results, permission modes, skills market, connectors, automation, and MCP guide. These are not optional reading if you want to use WorkBuddy seriously. Permission modes and automation are especially important because they directly affect data security and risk control.\n\nThe fifth panel covers enterprise collaboration and integration. WorkBuddy is not limited to local personal use. It can connect team workflows through WeCom, email, Tencent Docs, APIs, webhooks, connectors, and MCP. In enterprise use, the real value is usually not personal question answering, but letting AI access team materials and business systems in a controlled way.\n\nThe sixth panel lists Tencent Cloud resource entries. I suggest looking at TokenHub and MCP first because they determine model calls and tool integration. Then check specific products according to the business scenario: COS for file storage, VOD and CSS for video and live streaming, ASR for speech transcription, OCR for image text recognition, TMT for translation, and CloudBase or EdgeOne for application deployment.\n\nThe seventh panel groups Tencent Cloud products by scenario: storage and content, audio and video, AI capability, development and deployment, large models and knowledge, and communication. You do not need to learn every cloud product at once. You only need to know where to look when a specific problem appears.\n\nThe eighth panel gives the method for using official documentation: clarify the goal first, then find the relevant document, and finally practice. Do not learn documentation for its own sake. Learn with a concrete task. For example, if you want to automatically transcribe a live replay and generate a review report, you will need to check VOD, ASR, COS, WorkBuddy automation, and possibly WeCom notification.\n\nThe ninth panel is the advice: bookmark common pages, follow product updates, use search effectively, and join community discussions. Official documentation is the foundation. Community articles can provide cases, but for capability boundaries and dynamic information, always follow official documentation.", "webp": "images/02.webp", "audioZh": "audio/zh/02.mp3", "audioEn": "audio/en/02.mp3"}, {"id": 3, "title": "安装与第一次使用", "image": "3-安装与第一次使用.png", "zh": "我们接着说第一次使用 WorkBuddy 的完整路径。\n\n第一步是先了解它能做什么。WorkBuddy 可以帮你读文件、做分析、写文案、生成图片、写代码、自动化办公，也可以连接腾讯云服务。新手不要一上来就把复杂任务全部交给它，先用一个低风险任务感受流程。\n\n第二步是获取与下载。图中列出网页版、Windows 客户端和企业版。个人用户可以先用网页版体验，确认适合自己的工作流后，再安装客户端。企业用户如果涉及团队权限、企业数据、SSO、企业微信等能力，应由管理员统一开通和配置。\n\n第三步是安装 Windows 客户端。讲解时要提醒大家：安装包尽量从官网获取，不要随意下载第三方来源的安装包；安装过程中如果安全软件提示，要确认来源可靠后再继续。\n\n第四步是登录账号。图里展示了 QQ、微信、企业微信或 SSO 登录。企业场景中，账号体系非常重要，因为它决定了谁能访问哪些工作区、连接哪些资料、执行哪些操作。\n\n第五步是首次进入工作台。工作台通常会有对话、文件、知识库、自动化、应用中心、设置等入口。新手要先熟悉左侧导航，知道文件在哪里上传，任务在哪里发起，结果在哪里查看。\n\n第六步是上传第一个文件。图中示例包含产品调研报告、销售数据、竞品分析 PDF。上传文件时要注意两点：第一，尽量上传任务相关副本，不要把整个桌面或下载目录授权进去；第二，文件命名要清楚，方便 WorkBuddy 理解材料用途。\n\n第七步是发起第一个任务。不要只说“总结一下”，而要说清楚输出形式。例如：“请帮我总结这份产品调研报告的核心结论，并用表格展示背景、内容摘要和建议。”越具体，结果越稳定。\n\n第八步是探索应用与连接。应用中心可以扩展更多能力，例如腾讯文档、腾讯 COS、OCR 识别、智能表格、数据可视化等。连接器不是越多越好，先按业务需求配置必要连接。\n\n第九步是形成高效工作习惯：先从简单任务开始，提供清晰背景和要求，一步步迭代优化结果，善用文件和模板，定期整理知识库。上手的目标不是一次做大任务，而是建立可重复的工作方式。", "en": "Now let us talk about the complete path for first-time use of WorkBuddy.\n\nThe first step is to understand what it can do. WorkBuddy can read files, perform analysis, write copy, generate images, write code, automate office work, and connect to Tencent Cloud services. Beginners should not give it a complex task immediately. Start with a low-risk task to understand the workflow.\n\nThe second step is getting and downloading the product. The image shows the web version, the Windows client, and the enterprise version. Individual users can first try the web version and install the client after confirming it fits their workflow. Enterprise users who need team permissions, enterprise data, SSO, or WeCom integration should ask administrators to configure and enable the required capabilities.\n\nThe third step is installing the Windows client. During explanation, remind users to download the installer from the official website whenever possible. Do not install packages from unknown third-party sources. If security software prompts during installation, confirm the source before continuing.\n\nThe fourth step is login. The image shows QQ, WeChat, WeCom, or SSO login. In enterprise scenarios, the account system is very important because it determines who can access which workspace, which materials can be connected, and which operations can be executed.\n\nThe fifth step is entering the workspace for the first time. The workspace usually includes conversation, files, knowledge base, automation, application center, and settings. Beginners should first become familiar with the navigation: where to upload files, where to start tasks, and where to view results.\n\nThe sixth step is uploading the first file. The example includes a product research report, sales data, and a competitor analysis PDF. Pay attention to two points when uploading files. First, upload task-related copies whenever possible. Do not authorize the whole desktop or download folder. Second, use clear file names so WorkBuddy can understand the purpose of each material.\n\nThe seventh step is starting the first task. Do not only say \"summarize this.\" Specify the output format. For example: \"Please summarize the core conclusions of this product research report and present the background, content summary, and recommendations in a table.\" The more specific the instruction, the more stable the result.\n\nThe eighth step is exploring applications and connections. The application center can extend more capabilities, such as Tencent Docs, Tencent COS, OCR recognition, smart spreadsheets, and data visualization. Connectors are not better simply because there are more of them. Configure only the connections required by the business.\n\nThe ninth step is building efficient habits. Start from simple tasks, provide clear background and requirements, iterate step by step, use files and templates well, and regularly organize the knowledge base. The goal of getting started is not to complete a huge task immediately, but to build a repeatable way of working.", "webp": "images/03.webp", "audioZh": "audio/zh/03.mp3", "audioEn": "audio/en/03.mp3"}, {"id": 4, "title": "WorkBuddy 核心概念", "image": "4-WorkBuddy 核心概念.png", "zh": "这一页是 WorkBuddy 使用中的基础设施课。很多人用 AI 出问题，不是模型不够强，而是任务、文件和权限没有管理好。\n\n先看第一个概念：任务。任务不是一句随便的提问，而是一段完整目标。比如“整理合同信息”“汇总 3 个 Excel”“生成本地小工具”“每天 8:30 生成资讯简报”，这些都是任务。一个好任务要说清六件事：背景、输入、输出、口径、约束、验收。背景说明为什么做，输入说明材料在哪，输出说明要什么格式，口径说明怎么算，约束说明不能做什么，验收说明怎么判断做对了。\n\n第二个概念是工作区。工作区就是当前任务主要读写的文件夹。建议每个任务单独建目录，里面分成 input、output、backup、notes。原始文件放 input，备份放 backup，结果放 output，过程说明和记录放 notes。这样做的好处是边界清晰，出了问题也容易回退。\n\n第三个概念是工作区原则。不要把整个桌面、下载目录、共享盘根目录授权给 AI。高风险任务只放副本，不放唯一原件。尤其是批量重命名、格式转换、删除、覆盖、迁移这类任务，必须先备份，再小样本验证。\n\n第四个概念是权限模式。日常建议默认权限模式。遇到敏感路径、删除文件、脚本命令、网络访问等高风险动作，应先确认。Full Access 或完全访问类权限只适合你清楚知道它会操作哪些文件、文件已有备份、工作区已隔离、操作可恢复且不涉及隐私、财务、合同或生产系统的情况。\n\n第五个概念是结果面板。Artifacts 通常放报告、表格、PPT、网页、代码等交付物；All Files 是工作区文件；Changes 是文件变更；Preview 用于预览网页、应用或文档。验收时不能只看 AI 的总结，一定要打开真实文件检查。\n\n最后是任务状态与失败处理。常见状态包括规划中、进行中、待输入、完成、失败、已归档。失败后不要急着重跑，先让 WorkBuddy 说明失败原因、失败步骤、已修改文件、未完成事项，并给出不覆盖现有结果的修复方案。", "en": "This page is the foundation lesson for using WorkBuddy. Many AI failures are not caused by weak models. They happen because tasks, files, and permissions are not managed well.\n\nThe first concept is the task. A task is not a casual question. It is a complete goal. For example, organizing contract information, summarizing three Excel files, generating a local tool, or producing a news brief every day at 8:30 are all tasks. A good task should explain six things: background, input, output, calculation or business rules, constraints, and acceptance criteria. Background explains why we do it. Input explains where materials are. Output explains the expected format. Rules explain how to calculate or judge. Constraints explain what must not be done. Acceptance criteria explain how to know whether the task is correct.\n\nThe second concept is the workspace. The workspace is the main folder WorkBuddy reads from and writes to for the current task. I suggest creating a separate folder for each task, with input, output, backup, and notes folders inside. Put original files in input, backup copies in backup, results in output, and process notes in notes. This keeps boundaries clear and makes rollback easier.\n\nThe third concept is workspace discipline. Do not authorize the entire desktop, download folder, or shared drive root to AI. For high-risk tasks, use copies only, not the only original files. Batch renaming, format conversion, deletion, overwriting, and migration must be backed up and tested on a small sample first.\n\nThe fourth concept is permission mode. The default permission mode is recommended for daily use. When sensitive paths, file deletion, script commands, or network access are involved, confirmation should happen first. Full access is suitable only when you clearly know which files will be operated on, the files are backed up, the workspace is isolated, the operation is reversible, and the task does not involve privacy, finance, contracts, or production systems.\n\nThe fifth concept is the results panel. Artifacts usually contain reports, spreadsheets, PowerPoint files, web pages, code, and other deliverables. All Files shows workspace files. Changes shows file modifications. Preview is used to preview web pages, applications, or documents. During acceptance, do not only read the AI summary. Open the real files and check them.\n\nFinally, task status and failure handling. Common statuses include planning, running, waiting for input, completed, failed, and archived. If a task fails, do not rerun it immediately. First ask WorkBuddy to explain the failure reason, failed step, files already changed, unfinished items, and a repair plan that does not overwrite existing results.", "webp": "images/04.webp", "audioZh": "audio/zh/04.mp3", "audioEn": "audio/en/04.mp3"}, {"id": 5, "title": "Prompt 基本功：怎么把任务说清楚", "image": "5-Prompt 基本功：怎么把任务说清楚.png", "zh": "这一页是提高 WorkBuddy 成功率的关键。Prompt 不是写得越长越好，而是要把关键信息写全。\n\n第一格提醒我们：先说清，别含糊。“帮我处理一下文件”这种说法太宽泛，AI 不知道要处理什么、输出什么、按什么标准算完成。提示词越模糊，结果越容易跑偏。\n\n第二格给出最稳的五段式：角色、背景、材料、任务、输出。角色决定回答视角，比如“你是有 10 年经验的销售运营专家”；背景说明为什么要做，比如“我要给销售总监做 Q2 复盘”；材料说明数据来源，比如“读取当前工作区的 Excel、PDF、会议纪要”；任务说明具体动作，比如“清洗数据、计算指标、分析异常、生成建议”；输出说明文件类型、字段、格式和命名规则。\n\n第三格讲角色。让 WorkBuddy 扮演专业身份，不是为了装饰，而是为了让它采用更贴近业务的判断标准。财务分析、教育教学、直播运营、产品研发、销售获客，关注点都不一样。\n\n第四格讲背景。背景要回答两个问题：为什么做，想达成什么。比如“我要处理 Q2 销售数据，目标是找到增长来源和下季度动作建议”。没有背景，AI 很容易只做表面总结。\n\n第五格讲材料。要告诉它读取哪些文件、文件夹或链接。材料越清楚，越不容易漏读或误读。批量任务中尤其要指定只读 input 文件夹、结果保存到 output 文件夹，不改原件。\n\n第六格讲任务。动作要具体，步骤越清楚越好。不要只说“分析数据”，而要说“先统一日期和金额口径，再去重，接着按地区和产品计算销售额，最后输出异常值和结论”。\n\n第七格讲输出。输出格式一定要写明，例如 Markdown 报告、Excel 表、PPT 大纲、CSV、JSON、代码文件、任务清单等。还要说明字段、命名规则、字数范围、禁止事项和验收标准。\n\n第八格讲批量与分析任务。批量文件要强调只读 input、不改原件、逐个写日志、异常跳过并记录；数据分析要先说明分析目标、统计口径、输出清单和要求。\n\n第九格讲“先计划，再自检”。复杂任务最好先让 WorkBuddy 输出任务目标、文件清单、执行步骤、可能风险和不确定点，等人工确认后再开始。完成后再让它自检：是否满足要求、数字是否有来源、是否修改了不该改的文件、输出是否能打开。", "en": "This page is the key to improving the success rate of WorkBuddy. A prompt is not better just because it is longer. It is better when it contains the right information.\n\nThe first panel reminds us to be clear and not vague. \"Help me process this file\" is too broad. AI does not know what to process, what to output, or what standard counts as completion. The more vague the prompt, the easier the result drifts.\n\nThe second panel gives the most stable five-part structure: role, background, materials, task, and output. Role defines the perspective, such as \"you are a sales operations expert with ten years of experience.\" Background explains why we do it, such as \"I need to prepare a Q2 review for the sales director.\" Materials explain the data sources, such as Excel files, PDFs, and meeting notes in the workspace. Task explains concrete actions, such as cleaning data, calculating metrics, analyzing exceptions, and generating recommendations. Output explains file type, fields, format, and naming rules.\n\nThe third panel is role. Defining a professional identity is not decoration. It helps WorkBuddy use standards closer to the business scenario. Finance analysis, education, live streaming, product development, and sales acquisition all focus on different things.\n\nThe fourth panel is background. Background answers two questions: why are we doing this, and what outcome do we want? For example: \"I need to process Q2 sales data. The goal is to find growth sources and next-quarter actions.\" Without background, AI may only give a surface summary.\n\nThe fifth panel is materials. Tell it which files, folders, or links to read. Clear materials reduce missing or wrong reading. In batch tasks, especially specify that WorkBuddy should only read the input folder, save results to output, and not modify originals.\n\nThe sixth panel is task. Actions should be specific, and clearer steps are better. Do not only say \"analyze the data.\" Say: first standardize date and amount formats, then remove duplicates, then calculate sales by region and product, and finally output anomalies and conclusions.\n\nThe seventh panel is output. The output format must be clear, such as a Markdown report, Excel table, PowerPoint outline, CSV, JSON, code file, or task list. Also specify fields, naming rules, word count, prohibited actions, and acceptance criteria.\n\nThe eighth panel covers batch and analysis tasks. Batch file tasks should emphasize read-only input, no modification to originals, one log per file, and skipping plus recording unsupported formats. Data analysis tasks should first state the analysis goal, statistical rules, output list, and requirements.\n\nThe ninth panel is plan first and self-check later. For complex tasks, ask WorkBuddy to output the task goal, file list, execution steps, possible risks, and uncertain points first. Start only after human confirmation. After completion, ask it to self-check whether requirements are met, whether numbers have sources, whether it changed files it should not change, and whether outputs can be opened.", "webp": "images/05.webp", "audioZh": "audio/zh/05.mp3", "audioEn": "audio/en/05.mp3"}, {"id": 6, "title": "Skills、Connectors、MCP、自动化和远程助理", "image": "6-Skills、Connectors、MCP、自动化和远程助理.png", "zh": "这一页讲 WorkBuddy 为什么能从“能聊天”变成“能办事”。关键就是五个能力：Skills、Connectors、MCP、自动化和远程助理。\n\nSkills 可以理解成 AI 的“本领包”。它决定 WorkBuddy 会做哪些具体任务，比如写作、分析、制表、绘图、生成 PPT、处理 PDF、编程开发等。Skills 的价值是把某类任务的经验、模板和工具固化下来，减少每次从零描述的成本。\n\nConnectors 是连接外部数据的通道。很多业务资料不在聊天窗口里，而是在网盘、文档、日历、知识库、邮件、表格、业务系统里。连接器负责在授权范围内读取这些信息，让 AI 不再只依赖你手动复制粘贴。\n\nMCP 可以理解成统一接口标准。过去不同工具接入方式各不相同，容易混乱；MCP 的作用是让工具和服务按统一规则接入。比如天气服务、代码工具、数据工具、地图服务、企业内部系统，都可以通过标准方式被 AI 调用。\n\n自动化是流程自己跑。它把“收集信息、整理分析、生成结果、发送提醒”这些重复步骤串起来，减少人工反复操作。比如每周自动生成项目周报，每天自动汇总线索，每晚检查直播回放是否归档。\n\n远程助理是后台持续办事。它可以在你不盯着屏幕时继续执行任务，并在完成后汇报进度。企业场景中，这适合长周期、定时、批量和协作任务，但也更需要权限控制和审计。\n\n第七格说明它们如何配合：Skills 提供能力，Connectors 提供数据，MCP 连接工具，自动化编排步骤，远程助理负责持续执行。第八格的周报助手就是典型例子：连接邮箱或网盘读取材料，调用总结和分析能力，整理成周报，再自动发给团队。\n\n最后一句话要记住：Skills 是本领，Connectors 是通道，MCP 是接口标准，自动化是流程引擎，远程助理是执行者。把能力、数据、工具和流程连起来，AI 才能真正替你做事。", "en": "This page explains how WorkBuddy moves from chatting to doing real work. The key capabilities are Skills, Connectors, MCP, Automation, and Remote Assistant.\n\nSkills can be understood as AI skill packs. They decide which concrete tasks WorkBuddy can perform, such as writing, analysis, table creation, drawing, PowerPoint generation, PDF processing, and programming. The value of Skills is to solidify experience, templates, and tools for a task type, so we do not need to describe everything from scratch each time.\n\nConnectors are channels to external data. Many business materials are not inside a chat box. They are in cloud drives, documents, calendars, knowledge bases, emails, spreadsheets, and business systems. Connectors read authorized information from those sources, so AI no longer depends only on manual copy and paste.\n\nMCP can be understood as a unified interface standard. In the past, different tools were connected in different ways, which created confusion. MCP lets tools and services connect according to a unified rule. Weather services, code tools, data tools, map services, and internal enterprise systems can all be called by AI through standardized interfaces.\n\nAutomation means the workflow can run by itself. It connects repeated steps such as collecting information, organizing and analyzing it, generating results, and sending reminders. Examples include automatically generating weekly project reports, summarizing leads every day, or checking whether live replays are archived every night.\n\nRemote Assistant means background execution. It can continue tasks when you are not staring at the screen and report progress after completion. In enterprise scenarios, it is suitable for long-running, scheduled, batch, and collaborative tasks, but it also requires stronger permission control and audit trails.\n\nThe seventh panel explains how these capabilities work together. Skills provide capability. Connectors provide data. MCP connects tools. Automation arranges steps. Remote Assistant keeps executing. The weekly report assistant in the eighth panel is a typical example: connect to email or cloud drive, read materials, call summarization and analysis skills, turn everything into a weekly report, and send it to the team.\n\nRemember one sentence: Skills are capabilities, Connectors are channels, MCP is the interface standard, Automation is the workflow engine, and Remote Assistant is the executor. Only when capability, data, tools, and workflow are connected can AI truly do work for you.", "webp": "images/06.webp", "audioZh": "audio/zh/06.mp3", "audioEn": "audio/en/06.mp3"}, {"id": 7, "title": "WorkBuddy + 腾讯云资源总图", "image": "7-WorkBuddy + 腾讯云资源总图.png", "zh": "这一页讲 WorkBuddy 和腾讯云的组合价值。\n\nWorkBuddy 本身是桌面入口和 Agent 编排器。它理解需求、规划任务、调用工具、组织输出。腾讯云提供的是能力底座，也就是存储、识别、音视频、模型、知识库、部署、监控和通信等企业级能力。\n\n第三格讲模型与智能能力。TokenHub 可以作为多模型统一调用和 API Key 管理入口，便于成本管理和模型切换。TI-ONE 更偏模型训练、部署、服务和企业自选模型底座。对于企业来说，模型不一定只有一个，关键是不同场景选择合适模型，并能统一管理成本和权限。\n\n第四格讲知识与工具生态。MCP 广场可以把腾讯云和第三方工具接入 WorkBuddy；VectorDB 用于向量存储和检索，支撑 RAG 知识库。典型场景包括企业知识库问答、投标资料库、产品资料库和客服知识库。\n\n第五格讲存储与内容处理。COS 负责文件存储、上传下载和归档；数据万象可用于图片、文档和媒体处理；VOD 可用于上传、转码、截图、审核和 AI 处理。比如直播素材库、合同归档、巡店图片识别、视频切片，都离不开这类能力。\n\n第六格讲音视频与直播。云直播 CSS 负责推流、录制、截图、审核和监播；TRTC 负责实时音视频互动；VOD 和 CSS 可以联动，用于直播全流程运营和复盘。直播团队可以把策划、执行、录制、切片、发布、复盘形成闭环。\n\n第七格讲 AI 基础能力。OCR 做图片文字识别，ASR 做语音转写，TMT 做多语言翻译。它们可以直接支撑票据识别、价签识别、会议纪要、电话销售复盘、跨境客服、Listing 本地化等场景。\n\n第八格讲开发与部署。CloudBase 适合 Serverless 应用开发和部署，EdgeOne 提供加速、安全、边缘函数和 Makers 能力。WorkBuddy 可以辅助生成应用、网站、内部工具和 Agent Demo，再结合云能力快速上线。\n\n最后一格总结：从数据收集、处理、分析、内容生产，到应用部署、运营复盘，WorkBuddy 加腾讯云可以形成完整流程。实际落地时，建议先让 WorkBuddy 出计划，小样本跑通，再批量执行，最后生成交付物和复盘。", "en": "This page explains the combined value of WorkBuddy and Tencent Cloud.\n\nWorkBuddy itself is the desktop entry and agent orchestrator. It understands requirements, plans tasks, calls tools, and organizes outputs. Tencent Cloud provides the capability foundation, including storage, recognition, audio and video, models, knowledge bases, deployment, monitoring, and communication.\n\nThe third panel talks about models and intelligence. TokenHub can be used as a unified entry for multi-model calls and API key management, making cost management and model switching easier. TI-ONE focuses more on model training, deployment, serving, and enterprise-selected model foundations. For enterprises, the key is not having only one model. The key is choosing suitable models for different scenarios and managing cost and permissions consistently.\n\nThe fourth panel covers knowledge and the tool ecosystem. MCP Marketplace can connect Tencent Cloud and third-party tools to WorkBuddy. VectorDB is used for vector storage and retrieval, supporting RAG knowledge bases. Typical scenarios include enterprise knowledge Q&A, bidding material libraries, product material libraries, and customer service knowledge bases.\n\nThe fifth panel covers storage and content processing. COS handles file storage, upload, download, and archiving. Data processing services can handle images, documents, and media. VOD can handle upload, transcoding, screenshots, review, and AI processing. Live material libraries, contract archiving, store image recognition, and video clipping all rely on these capabilities.\n\nThe sixth panel covers audio, video, and live streaming. Cloud Streaming Services handle push streaming, recording, screenshots, review, and monitoring. TRTC handles real-time audio and video interaction. VOD and CSS can work together for full live-stream operations and review.\n\nThe seventh panel covers basic AI capabilities. OCR recognizes text in images. ASR transcribes speech. TMT translates multiple languages. They support invoice recognition, price tag recognition, meeting minutes, sales call review, cross-border customer service, and localized listings.\n\nThe eighth panel covers development and deployment. CloudBase is suitable for serverless application development and deployment. EdgeOne provides acceleration, security, edge functions, and Makers capabilities. WorkBuddy can help generate applications, websites, internal tools, and agent demos, then combine cloud capabilities for fast deployment.\n\nThe last panel summarizes the complete flow: data collection, processing, analysis, content production, application deployment, operations review, and continuous improvement. In real implementation, let WorkBuddy produce a plan first, run a small sample, then execute in batch, and finally generate deliverables and review notes.", "webp": "images/07.webp", "audioZh": "audio/zh/07.mp3", "audioEn": "audio/en/07.mp3"}, {"id": 8, "title": "PDF 处理专题", "image": "8-PDF 处理专题.png", "zh": "这一页讲 PDF 处理。PDF 是办公中最常见的材料格式之一，但也是最容易出问题的格式之一。因为 PDF 可能是可复制文字，也可能是扫描件；可能有表格、图片、水印、页眉页脚，也可能有多栏排版。\n\n第一步是导入 PDF 文件。建议把需要处理的 PDF 放到独立工作区，不要混入无关文件。批量处理时，可以把合同、产品手册、市场报告、会议纪要等文件集中到 input 文件夹，并明确输出放到 output。\n\n第二步是告诉 WorkBuddy 目标。目标要具体，比如“提取所有 PDF 的文字内容”“生成摘要”“提取表格并合并为 Excel”“把文件翻译成英文”“最后生成汇总报告”。复杂任务要先让它给出任务步骤和预估风险，确认后再执行。\n\n第三步是智能解析和 OCR。普通 PDF 可以直接提取文字，扫描件或图片型 PDF 需要 OCR。表格型 PDF 要特别说明要提取哪些字段、保留哪些列、如何处理跨页表格和空值。\n\n第四步是常见处理能力，包括提取文字、摘要总结、提取表格、页面拆分、合并 PDF、删除或旋转、格式转换、翻译、批量重命名，以及加水印、加页码、压缩、解密等进阶任务。不同任务风险不同，删除、覆盖和批量重命名要特别谨慎。\n\n第五步是批量执行。批量处理时不要只看最终结果，要让 WorkBuddy 输出处理日志：处理了几个文件、成功几个、失败几个、失败原因是什么、是否有无法识别的页面。这样后续排查才有依据。\n\n第六步是结果预览。常见输出包括所有文字 `.txt`、摘要汇总 `.md`、表格合并 `.xlsx`、翻译文件 `.docx`、汇总报告 `.pptx`。验收时要打开文件检查，尤其是表格、金额、日期、合同条款和扫描件识别结果。\n\n第七步是继续追问。WorkBuddy 的优势是可以在结果基础上迭代，例如“摘要再简洁一点”“只保留每份 PDF 的核心结论”“请把表格按日期排序并计算合计和平均值”。越具体，迭代越有效。\n\n第八步是自动化处理。比如每周自动处理合同 PDF、每天更新报告汇总、新文件自动 OCR 入库。自动化适合重复、低风险、流程稳定的任务，高风险文件处理必须保留人工审核。", "en": "This page focuses on PDF processing. PDF is one of the most common office formats, but it is also one of the easiest formats to handle incorrectly. A PDF may contain selectable text, or it may be a scanned image. It may contain tables, images, watermarks, headers, footers, or multi-column layouts.\n\nThe first step is importing PDF files. Put the PDFs that need processing into an isolated workspace, not mixed with unrelated files. For batch processing, place contracts, product manuals, market reports, meeting minutes, and other files into the input folder, and clearly specify that outputs go to the output folder.\n\nThe second step is telling WorkBuddy the goal. The goal should be specific: extract all text from PDFs, generate summaries, extract tables and merge them into Excel, translate files into English, or generate a final summary report. For complex tasks, ask WorkBuddy to provide task steps and estimated risks first, then execute after confirmation.\n\nThe third step is intelligent parsing and OCR. Normal PDFs can directly provide text. Scanned or image-based PDFs require OCR. For table PDFs, specify which fields to extract, which columns to keep, and how to handle cross-page tables and empty values.\n\nThe fourth step is common processing capability, including text extraction, summaries, table extraction, page splitting, PDF merging, deletion or rotation, format conversion, translation, batch renaming, watermarks, page numbers, compression, and decryption. These tasks have different risk levels. Deletion, overwriting, and batch renaming must be treated carefully.\n\nThe fifth step is batch execution. For batch processing, do not only look at the final result. Ask WorkBuddy to output a processing log: how many files were processed, how many succeeded, how many failed, why they failed, and whether there were unrecognized pages.\n\nThe sixth step is previewing results. Common outputs include text files, Markdown summary files, merged Excel tables, translated Word files, and summary PowerPoint files. During acceptance, open the files and check them, especially tables, amounts, dates, contract clauses, and OCR results from scanned pages.\n\nThe seventh step is continuing to ask follow-up questions. WorkBuddy can iterate on results. For example: make the summary more concise, keep only the core conclusion of each PDF, sort the table by date and calculate totals and averages. The more specific the follow-up, the more useful the iteration.\n\nThe eighth step is automated processing. For example, automatically process contract PDFs every week, update report summaries every day, or OCR new files and import them into a knowledge base. Automation is suitable for repeated, low-risk, stable workflows. High-risk files must keep human review.", "webp": "images/08.webp", "audioZh": "audio/zh/08.mp3", "audioEn": "audio/en/08.mp3"}, {"id": 9, "title": "日常办公复杂案例", "image": "9-日常办公复杂案例.png", "zh": "这一页是典型办公场景。很多团队每个月都要做经营分析报告，材料来自销售明细、费用报销、市场活动效果、竞品动态、管理层要求和历史数据。人工做这件事最耗时间的地方，不是写结论，而是找数据、对口径、清洗数据、画图、整理行动项。\n\n第一步是明确目标：把多个系统和文件的数据整理成一份月度经营分析报告，包含图表、结论和下月建议。目标必须清楚，否则 WorkBuddy 不知道是给老板看、给运营团队看，还是给销售团队看。\n\n第二步是明确输入材料。图里列出销售明细、费用报销、市场活动效果 PDF、竞品动态文件夹、管理层要求和历史数据。讲者要强调：材料要尽量齐全，命名要清楚，口径说明要放在任务里。\n\n第三步是让 WorkBuddy 先出计划。计划清单包括数据理解与口径对齐、数据清洗与整合、核心指标计算、结果可视化、经营分析与结论、问题原因分析、下月建议与行动清单、生成 PPT 报告。先看计划再执行，可以减少返工。\n\n第四步是数据清洗与整合。WorkBuddy 可以处理缺失值、异常值、统一口径，把多个表合并成一张分析底表。这里要特别提醒：所有数字必须来自原始文件，缺失和异常数据要单独列出，不要自动脑补。\n\n第五步是生成关键指标与图表。图中示例包括销售额、毛利率、费用率、净利润，以及销售趋势和费用结构占比。报告里最有价值的不是图表本身，而是图表背后的业务解释。\n\n第六步是经营分析与结论。示例结论包括销售增长、毛利率提升、市场费用占比偏高、净利润增长。讲者要提醒：结论要区分事实、判断和建议。事实来自数据，判断来自分析，建议才是行动方向。\n\n第七步是问题与原因分析。比如市场活动 ROI 偏低、部分产品毛利下滑、个别区域增长放缓，原因可能是投放渠道不精准、折扣力度过大、当地竞争加剧。问题不能只列现象，要追到原因。\n\n第八步是下月建议与行动清单。建议要可执行，有负责人和截止时间。比如投放渠道优化方案由市场部张三负责，产品定价评估由产品部李四负责，区域市场调研由销售部王五负责。\n\n第九步是生成交付物和复盘归档。最终可以输出月度经营分析报告 PPT、分析底表 Excel、任务复盘说明。交付后还要把提示词、数据口径、报告模板沉淀下来，下个月复用。", "en": "This page is a typical office scenario. Many teams produce a business analysis report every month. The materials come from sales details, expense reports, marketing activity results, competitor updates, management requirements, and historical data. The most time-consuming part is often not writing conclusions, but finding data, aligning definitions, cleaning data, drawing charts, and organizing action items.\n\nThe first step is defining the goal: organize data from multiple systems and files into a monthly business analysis report with charts, conclusions, and recommendations for next month. The target must be clear; otherwise WorkBuddy will not know whether the report is for executives, operations, or sales.\n\nThe second step is defining input materials. The image lists sales details, expense reports, marketing activity result PDFs, competitor update folders, management requirements, and historical data. Materials should be complete, file names should be clear, and business definitions should be included in the task.\n\nThe third step is asking WorkBuddy to make a plan first. The plan includes understanding data and aligning definitions, cleaning and merging data, calculating key metrics, visualizing results, drawing business conclusions, analyzing problems and causes, producing next-month recommendations and action items, and generating a PowerPoint report. Reviewing the plan before execution reduces rework.\n\nThe fourth step is data cleaning and integration. WorkBuddy can handle missing values, anomalies, consistent definitions, and merging multiple tables into an analysis base table. All numbers must come from original files. Missing and abnormal data should be listed separately, not guessed.\n\nThe fifth step is generating key metrics and charts. The example includes sales, gross margin, expense ratio, net profit, sales trend, and expense structure. The most valuable part of a report is not the chart itself, but the business explanation behind it.\n\nThe sixth step is business analysis and conclusions. Example conclusions include sales growth, gross margin improvement, high marketing expense ratio, and net profit growth. Conclusions should separate facts, judgments, and recommendations. Facts come from data, judgments come from analysis, and recommendations become action.\n\nThe seventh step is problem and cause analysis. For example, marketing ROI is low, some products have declining margin, and some regions grow slowly. Causes may include inaccurate channel targeting, excessive discounts, or stronger local competition. Do not only list phenomena; trace them back to causes.\n\nThe eighth step is next-month recommendations and action items. Recommendations should be executable, with owners and deadlines. For example, the marketing department owns channel optimization, the product department owns pricing evaluation, and the sales department owns regional market research.\n\nThe ninth step is generating deliverables and archiving the review. Final outputs may include a monthly analysis PowerPoint, an Excel analysis table, and task review notes. After delivery, preserve the prompt, data definitions, and report template so the next month can reuse them.", "webp": "images/09.webp", "audioZh": "audio/zh/09.mp3", "audioEn": "audio/en/09.mp3"}, {"id": 10, "title": "编程与产品研发复杂案例", "image": "10-编程与产品研发复杂案例.png", "zh": "这一页讲研发场景。WorkBuddy 在编程里不是只负责“写一段代码”，而是可以覆盖从需求到交付的多个环节。\n\n第一步是需求理解与产品规划。研发任务不能只说“做个系统”，要说明解决什么问题、目标用户是谁、核心功能有哪些、技术偏好和约束是什么。WorkBuddy 可以基于这些信息输出产品目标、功能清单、用户流程图和技术选型建议。\n\n第二步是 PRD 与原型生成。它可以帮助生成 PRD 文档、原型图、流程图和需求清单。对产品经理来说，这能快速把想法变成可讨论的文档；对开发来说，这能减少“需求说不清”的沟通成本。\n\n第三步是技术方案与工程初始化。图里示例是 React 前端、Node.js 后端、API 网关、MySQL、Redis、COS 等架构。WorkBuddy 可以生成架构图、技术栈说明、项目目录结构、部署方案，还能初始化代码规范、`.gitignore` 和 README。\n\n第四步是代码生成与功能开发。它可以按任务拆分功能，逐步生成注册登录、文章列表、评论点赞、后台管理等模块。但讲者要强调：生成代码后必须运行、测试和审查，不能把 AI 生成代码直接视为生产可用。\n\n第五步是调试、测试与问题修复。图中示例是 `Cannot read property id of undefined`，WorkBuddy 可以根据报错信息定位问题、解释原因、提出修复建议，并补充异常处理和日志记录。\n\n第六步是测试用例与自动化测试。它可以生成正常流程、异常流程、边界条件、权限校验等测试用例，并配置单元测试、集成测试、E2E 测试和覆盖率报告。研发场景里，测试是让 AI 产出可控的关键。\n\n第七步是构建、部署与发布。WorkBuddy 可以帮助生成部署步骤，比如打包构建、推送代码、部署到服务器、启动服务和健康检查。若结合腾讯云 CVM、容器、数据库、对象存储等能力，可以进一步形成上线流程。\n\n第八步是监控、日志与性能优化。接入监控后，可以分析 QPS、响应时间、错误率、CPU 使用率和日志，发现数据库慢查询、缓存命中率低等问题，并给出优化方案。\n\n第九步是迭代计划与复盘总结。研发不是一次交付结束，而是持续迭代。WorkBuddy 可以生成下一版本计划、复盘报告、遗留问题清单和行动项。", "en": "This page is about product and engineering work. In programming, WorkBuddy is not only for writing a piece of code. It can cover multiple stages from requirement to delivery.\n\nThe first step is requirement understanding and product planning. A development task should not only say \"build a system.\" It should explain what problem is being solved, who the target users are, which core features are needed, and what technical preferences or constraints exist. WorkBuddy can produce product goals, feature lists, user flow diagrams, and technology suggestions.\n\nThe second step is PRD and prototype generation. WorkBuddy can help generate PRD documents, prototypes, flowcharts, and requirement lists. For product managers, this turns ideas into discussable documents quickly. For developers, it reduces communication caused by unclear requirements.\n\nThe third step is technical solution and project initialization. The example uses a React front end, Node.js back end, API gateway, MySQL, Redis, and COS. WorkBuddy can generate architecture diagrams, technology stack descriptions, project folder structures, deployment plans, coding rules, gitignore files, and README files.\n\nThe fourth step is code generation and feature development. It can split the task into features and gradually generate modules such as registration and login, article lists, comments and likes, and admin management. But generated code must be run, tested, and reviewed. Do not treat AI-generated code as production-ready by default.\n\nThe fifth step is debugging, testing, and fixing issues. The image shows an error such as \"Cannot read property id of undefined.\" WorkBuddy can use error messages to locate the problem, explain the cause, propose a fix, and add exception handling and logging.\n\nThe sixth step is test cases and automated testing. It can generate normal flows, exception flows, boundary conditions, and permission tests, then configure unit tests, integration tests, end-to-end tests, and coverage reports. Testing is the key to making AI output controllable in engineering work.\n\nThe seventh step is building, deployment, and release. WorkBuddy can help generate deployment steps, such as building packages, pushing code, deploying to servers, starting services, and health checks. Combined with Tencent Cloud CVM, containers, databases, and object storage, it can further support an online release workflow.\n\nThe eighth step is monitoring, logs, and performance optimization. After monitoring is connected, it can analyze QPS, response time, error rate, CPU usage, and logs, then identify slow database queries, low cache hit rate, and other issues.\n\nThe ninth step is iteration planning and review. Development does not end after one delivery. WorkBuddy can generate next-version plans, review reports, remaining issue lists, and action items.", "webp": "images/10.webp", "audioZh": "audio/zh/10.mp3", "audioEn": "audio/en/10.mp3"}, {"id": 11, "title": "教育与教学复杂案例", "image": "11-教育与教学复杂案例.png", "zh": "这一页讲教育和教学场景。老师最耗时间的工作之一，是把分散在教务系统、表格、在线表单和作业里的数据整理出来，形成有用的教学反馈。\n\n第一步是明确需求场景。学期末，老师需要汇总多个课程的学生成绩、出勤、作业与测验数据，生成学情分析报告，并为不同学生提供个性化学习建议。这类任务非常适合 WorkBuddy，因为它需要大量整理、分析和格式化输出。\n\n第二步是数据收集与整理。WorkBuddy 可以连接教务系统、Excel 表格、在线表单等数据源，自动抓取成绩、出勤和作业提交数据，并进行去重、补全缺失值和统一格式。这里要特别注意学生隐私和数据授权，不能把敏感学生信息随意外发。\n\n第三步是学情分析与可视化。它可以自动生成班级整体分析：平均分趋势、成绩分布、知识点掌握热力图、出勤率等。老师可以快速看出全班问题在哪里，不再只凭印象判断。\n\n第四步是个性化学习建议。基于学生的薄弱知识点和学习记录，WorkBuddy 可以为每个学生生成专属建议和练习题。例如某个学生二次函数和几何证明薄弱，建议观看微课并专项练习；另一个学生英语阅读理解弱，建议阅读训练和词汇巩固。\n\n第五步是自动生成教学材料。它可以根据教学进度和学生薄弱点生成复习课件、练习卷、错题集和小测验。老师要做的是审阅和调整，而不是从零制作。\n\n第六步是家校沟通与反馈。WorkBuddy 可以生成学生学习报告，并通过合规方式分享给家长。这里要强调：给家长的内容要客观、克制、有建设性，不做标签化评价，不输出心理或医学判断。\n\n第七步是智能答疑与辅导。学生可以提问，WorkBuddy 给出知识点讲解、例题解析和学习方法指导。它可以作为辅助学习工具，但不能代替老师的专业判断。\n\n第八步是教学效果追踪。通过阶段性对比报告，老师可以看到哪些学科提升明显，哪些还需加强，从而调整教学策略。\n\n第九步总结价值：数据处理自动化、分析可视化、个性化教学、家校高效沟通、教学持续优化。真正的目标不是让 AI 替代老师，而是让老师从繁琐数据处理中解放出来，把精力放到教学和育人上。", "en": "This page is about education and teaching. One of the most time-consuming tasks for teachers is organizing data scattered across academic systems, spreadsheets, online forms, and assignments, then turning it into useful teaching feedback.\n\nThe first step is defining the learning scenario. At the end of a semester, teachers may need to summarize student grades, attendance, homework, and quiz data across multiple courses, generate learning analysis reports, and provide personalized learning suggestions. This is suitable for WorkBuddy because it involves large amounts of organization, analysis, and formatted output.\n\nThe second step is data collection and organization. WorkBuddy can connect to academic systems, Excel tables, and online forms, capture grades, attendance, and homework submission data, then remove duplicates, fill or mark missing values, and standardize formats. Student privacy and data authorization must be handled carefully. Sensitive student information cannot be shared casually.\n\nThe third step is learning analysis and visualization. WorkBuddy can automatically generate class-level analysis, including average score trends, score distribution, knowledge mastery heat maps, and attendance rates. Teachers can quickly see where the class has problems instead of relying only on impressions.\n\nThe fourth step is personalized learning recommendations. Based on students' weak knowledge points and learning records, WorkBuddy can generate individual suggestions and exercises. For example, one student may need practice in quadratic functions and geometry proof, while another may need English reading and vocabulary reinforcement.\n\nThe fifth step is automatically generating teaching materials. It can create review slides, practice papers, error collections, and small quizzes based on teaching progress and student weaknesses. Teachers review and adjust the materials instead of starting from zero.\n\nThe sixth step is home-school communication and feedback. WorkBuddy can generate student learning reports and share them with parents through compliant channels. Content for parents should be objective, restrained, and constructive. It should not label students or make psychological or medical judgments.\n\nThe seventh step is intelligent Q&A and tutoring. Students can ask questions and receive explanations, example analysis, and learning method guidance. It is an auxiliary learning tool, not a replacement for teachers' professional judgment.\n\nThe eighth step is tracking teaching effectiveness. Through staged comparison reports, teachers can see which subjects improved and which still need support, then adjust teaching strategies.\n\nThe ninth step summarizes value: automated data processing, visual analysis, personalized teaching, efficient home-school communication, and continuous teaching optimization. The goal is not to replace teachers, but to free teachers from repetitive data work so they can focus on teaching and educating.", "webp": "images/11.webp", "audioZh": "audio/zh/11.mp3", "audioEn": "audio/en/11.mp3"}, {"id": 12, "title": "直播与视频运营复杂案例", "image": "12-直播与视频运营复杂案例.png", "zh": "这一页讲直播和视频运营。直播不是从开播才开始，也不是下播就结束。完整链路包括策划、脚本、素材、监控、助播、录制、剪辑、发布、复盘、沉淀和优化。\n\n第一步是明确目标与直播方案。图中示例目标是提升品牌曝光，主题是新品发布会，平台是抖音和视频号，时间是周五 19:30，时长 90 分钟，核心 KPI 是观看量、互动率和转化率。直播前把目标和 KPI 写清楚，后面的脚本和复盘才有标准。\n\n第二步是素材与脚本准备。WorkBuddy 可以生成直播脚本、流程表和素材清单。图里把 90 分钟拆成开场预热、新品讲解、互动抽奖、案例分享和收尾转化。素材包括产品图、视频、PPT、案例图、背景音乐和贴片。\n\n第三步是直播开播与实时监控。结合云直播 CSS 和 TRTC，可以做推流、录制、截图、审核、监播和实时互动。监控指标包括在线人数、互动率、点赞数、转化率等，异常时要能自动提醒。\n\n第四步是 AI 助播实时辅助。WorkBuddy 可以根据直播节奏提供话术建议、自动识别用户问题并推荐回答、提醒敏感词和风险内容、分析互动数据并给出节奏建议。它不是替主播说话，而是当“场控辅助”。\n\n第五步是录制、剪辑与素材处理。直播录制可以自动保存，AI 辅助二创生成精彩片段、短视频切片、图文海报和字幕文件。一次直播可以变成多种可分发内容资产。\n\n第六步是多平台分发与发布。图中列出抖音、视频号、快手、小红书、B 站。WorkBuddy 可以辅助生成标题、封面、标签、评论话术和置顶内容，并安排不同时间段发布。\n\n第七步是数据分析与复盘。复盘不是只看观看人数，还要看最高在线人数、互动率、点击数、转化率、成交金额、流量来源、观看人群和高光时段。最终要输出优化建议，例如加强新品演示时长、增加互动抽奖频次。\n\n第八步是资产沉淀与知识库建设。直播回放、脚本文档、Q&A 问答库、用户反馈、产品卖点库、话术库都可以沉淀为可复用知识。结合 COS 和 VectorDB，可以形成长期知识资产。\n\n第九步是持续优化与自动化运营。把策划、执行、分发、分析、优化做成 SOP 和自动化流程，直播团队就能从“每次重新开始”变成“持续复用和迭代”。", "en": "This page is about live streaming and video operations. A live stream does not start only when the broadcast begins, and it does not end when the host goes offline. The full chain includes planning, scripts, materials, monitoring, co-host support, recording, editing, publishing, review, knowledge accumulation, and optimization.\n\nThe first step is defining goals and the live streaming plan. The example goal is increasing brand exposure. The theme is a new product launch. Platforms include Douyin and WeChat Channels. Time is Friday at 19:30. Duration is 90 minutes. Core KPIs are views, interaction rate, and conversion rate. If goals and KPIs are clear before the stream, scripts and review will have standards.\n\nThe second step is preparing materials and scripts. WorkBuddy can generate live scripts, process tables, and material lists. The image divides a 90-minute stream into warm-up, product introduction, interactive lottery, case sharing, and closing conversion. Materials include product images, videos, PowerPoint slides, case images, background music, and overlays.\n\nThe third step is broadcasting and real-time monitoring. Combined with Cloud Streaming Services and TRTC, you can handle push streaming, recording, screenshots, review, monitoring, and real-time interaction. Metrics include online viewers, interaction rate, likes, and conversion. Abnormal situations should trigger reminders.\n\nThe fourth step is AI co-host assistance. WorkBuddy can provide talking points, identify user questions and recommend answers, remind hosts of sensitive terms and risk content, and analyze interaction data to suggest pace adjustments. It does not replace the host; it assists the live control team.\n\nThe fifth step is recording, editing, and material processing. Live recordings can be automatically saved, and AI can help generate highlights, short video clips, posters, and subtitle files. One live stream can become multiple distributable content assets.\n\nThe sixth step is multi-platform distribution and publishing. The image lists Douyin, WeChat Channels, Kuaishou, Xiaohongshu, and Bilibili. WorkBuddy can help generate titles, covers, tags, comment scripts, pinned content, and scheduled publishing.\n\nThe seventh step is data analysis and review. Review should not only look at viewer count. It should also examine peak online viewers, interaction rate, clicks, conversion rate, revenue, traffic sources, audience profile, and highlight periods. Final recommendations may include longer product demonstrations or more interactive lotteries.\n\nThe eighth step is asset accumulation and knowledge base construction. Replays, scripts, Q&A libraries, user feedback, product selling point libraries, and script libraries can be stored as reusable knowledge. COS and VectorDB can help build long-term knowledge assets.\n\nThe ninth step is continuous optimization and automated operations. When planning, execution, distribution, analysis, and optimization become SOPs and automated workflows, the team moves from starting over each time to continuous reuse and iteration.", "webp": "images/12.webp", "audioZh": "audio/zh/12.mp3", "audioEn": "audio/en/12.mp3"}, {"id": 13, "title": "跨境电商复杂案例", "image": "13-跨境电商复杂案例.png", "zh": "这一页讲跨境电商。跨境电商不是单点优化一个 Listing，而是从选品、定价、广告、物流、客服、评价到数据复盘的完整链路。\n\n第一步是明确目标与店铺现状。图中目标包括提升销量和利润、降低广告成本、拓展欧美市场、打造爆款产品。WorkBuddy 可以先帮助分析现状、找到机会、制定策略和输出执行清单。\n\n第二步是市场与竞品调研。它可以整理市场规模与趋势、热销品类、关键词需求、价格带分析、Top 竞品对比和用户评价。调研要注意数据来源，公开资料可以用，但不能绕过平台规则或采集隐私信息。\n\n第三步是选品与利润测算。图中示例按售价、成本、物流、广告、平台费计算预计利润和利润率。很多跨境团队的问题是只看销量不看利润，WorkBuddy 可以帮助把成本结构算清楚。\n\n第四步是 Listing 优化与素材生成。它可以生成 SEO 标题、五点卖点、产品描述、A+ 页面大纲、关键词埋词和主图文案建议。比如图中英文标题示例和五点卖点，就体现了本地化表达的重要性。\n\n第五步是广告投放策略制定。WorkBuddy 可以根据关键词漏斗、否定词清理、精准词扩展、预算建议和 ROAS 目标，生成可执行广告计划。广告策略要持续监控，不是一次设置后不管。\n\n第六步是订单履约与物流优化。不同物流方式在时效、成本和适用品类上不同。WorkBuddy 可以对比海运专线、空运专线、海外仓等方案，按美国站、欧洲站、大件低频等场景给出建议。\n\n第七步是客服与评价管理。它可以整理常见问题自动回复、发货后通知、差评预警、中差评分析和产品服务优化建议。客服话术要真实合规，不能夸大承诺。\n\n第八步是数据监控与运营分析。核心指标包括销售额、订单数、转化率、ACoS、利润，以及趋势和异常预警。发现问题后要能定位到广告组、SKU、库存、差评或材料问题。\n\n第九步是复盘总结与下一步计划。比如确认爆款产品、优化广告结构、提升物流时效、提高利润率，然后制定拓展新品类、增加站点、建立品牌站和会员体系等下一阶段计划。", "en": "This page is about cross-border e-commerce. Cross-border operations are not just about optimizing one listing. They are a full chain from product selection, pricing, advertising, logistics, customer service, reviews, and data review.\n\nThe first step is defining goals and store status. Goals may include increasing sales and profit, reducing advertising cost, expanding into European and American markets, and creating hit products. WorkBuddy can first analyze the current situation, find opportunities, design strategies, and output an execution list.\n\nThe second step is market and competitor research. It can organize market size and trends, hot categories, keyword demand, price band analysis, top competitor comparison, and user reviews. Research must pay attention to data sources. Public information can be used, but platform rules and privacy boundaries must not be bypassed.\n\nThe third step is product selection and profit calculation. The image calculates estimated profit and margin based on selling price, cost, logistics, advertising, and platform fees. Many teams look only at sales volume and ignore profit. WorkBuddy helps make the cost structure clear.\n\nThe fourth step is listing optimization and material generation. It can create SEO titles, bullet points, product descriptions, A+ page outlines, keyword placement, and main image copy suggestions. The English title and bullet examples in the image show why localization matters.\n\nThe fifth step is advertising strategy. WorkBuddy can generate executable ad plans based on keyword funnels, negative keyword cleanup, exact keyword expansion, budget suggestions, and ROAS goals. Advertising strategy must be monitored continuously, not set once and forgotten.\n\nThe sixth step is order fulfillment and logistics optimization. Different logistics methods differ in time, cost, and suitable categories. WorkBuddy can compare sea freight, air freight, overseas warehouses, and other options, then give suggestions for the US site, Europe site, large items, and low-frequency products.\n\nThe seventh step is customer service and review management. It can organize common question replies, post-shipping notifications, negative review warnings, review analysis, and product service improvement suggestions. Customer service scripts must be truthful and compliant and cannot exaggerate promises.\n\nThe eighth step is data monitoring and operational analysis. Core metrics include sales, orders, conversion rate, ACoS, profit, trends, and anomaly warnings. When problems appear, they should be traced to ad groups, SKUs, inventory, reviews, or material issues.\n\nThe ninth step is review and next-step planning. For example, confirm hit products, optimize ad structures, improve logistics timeliness, and raise profit margin. Then plan new categories, new markets, brand sites, and membership systems.", "webp": "images/13.webp", "audioZh": "audio/zh/13.mp3", "audioEn": "audio/en/13.mp3"}, {"id": 14, "title": "销售与获客复杂案例", "image": "14-销售与获客复杂案例.png", "zh": "这一页讲销售与获客。销售工作的核心不是“多发消息”，而是找对客户、讲清价值、持续跟进、及时复盘。\n\n第一步是目标与定位。要明确产品或服务适合哪些人，客户画像是什么，核心痛点是什么，产品卖点和差异化优势是什么。WorkBuddy 可以帮助把这些信息整理成销售策略和获客方向。\n\n第二步是市场与竞品分析。它可以快速收集行业趋势、市场规模、竞品信息，生成分析报告，帮助销售团队找到机会点和突破口。比如“原来我们的优势在这里，可以主打差异化卖点”。\n\n第三步是潜在客户挖掘。图中列出数据来源：企业查询、行业网站、展会名录、地图位置、社交媒体、表单线索等。这里要特别强调：只使用合法授权或公开合规数据，不绕过平台限制，不采集个人隐私。\n\n第四步是个性化触达内容生成。WorkBuddy 可以针对不同客户画像，生成个性化邮件、私信、话术和方案。好处是更有针对性，但发送前必须人工审阅，避免误发、夸大或不符合品牌口径。\n\n第五步是客户跟进与对话辅助。销售和客户沟通时，WorkBuddy 可以实时提供话术建议、异议处理、案例和资料，帮助提高成交率。它可以提醒“客户担心价格高”，并建议强调长期价值和 ROI。\n\n第六步是方案与报价生成。根据客户需求自动生成解决方案、报价单和演示 PPT，快速响应客户要求。方案必须结合真实报价规则和交付能力，不能让 AI 随意承诺。\n\n第七步是数据分析与优化。它可以分析获客渠道、触达效果、转化漏斗，发现哪里效率低、哪里需要改进。比如触达人数、回复数、意向客户、成交客户和渠道效果对比。\n\n第八步是自动化流程与提醒。可以设置自动跟进流程、定期提醒和任务分配，例如新线索进入、发送欢迎邮件、3 天后提醒、7 天后发案例资料、14 天后确认需求。自动化要适度，不要变成骚扰。\n\n第九步是复盘与团队协作。销售知识库、成功案例库、客户常见问题、产品话术库、方案模板库、竞品资料库都可以沉淀下来，团队共享后整体销售能力会提升。", "en": "This page is about sales and lead generation. The core of sales is not sending more messages. It is finding the right customers, explaining value clearly, following up consistently, and reviewing results in time.\n\nThe first step is goal and positioning. Clarify who the product or service is suitable for, what the customer profile is, what pain points matter most, and what selling points and differentiation the product has. WorkBuddy can help organize this information into sales strategy and acquisition direction.\n\nThe second step is market and competitor analysis. It can quickly collect industry trends, market size, and competitor information, then generate analysis reports to help the sales team find opportunities and entry points. For example, it may reveal where our advantage is and which differentiated selling point should be emphasized.\n\nThe third step is potential customer discovery. The image lists sources such as company databases, industry websites, exhibition lists, map locations, social media, and form leads. Use only legally authorized or compliant public data. Do not bypass platform restrictions or collect personal privacy.\n\nThe fourth step is personalized outreach content. WorkBuddy can generate personalized emails, private messages, scripts, and proposals for different customer profiles. This improves relevance, but all external content must be reviewed manually to avoid wrong sending, exaggeration, or inconsistency with brand language.\n\nThe fifth step is customer follow-up and conversation assistance. During customer conversations, WorkBuddy can provide talking points, objection handling, cases, and materials to improve conversion. It can remind the salesperson that a customer is worried about price and suggest emphasizing long-term value and ROI.\n\nThe sixth step is solution and quotation generation. Based on customer needs, it can generate solutions, quotations, and presentation decks quickly. These must follow real pricing rules and delivery capability. AI should not make random commitments.\n\nThe seventh step is data analysis and optimization. WorkBuddy can analyze acquisition channels, outreach results, conversion funnels, and identify where efficiency is low. Metrics include total leads, contacted customers, replies, interested customers, deals, and channel comparisons.\n\nThe eighth step is automated workflows and reminders. You can set automatic follow-up processes, regular reminders, and task assignments, such as new lead entry, welcome email, three-day reminder, seven-day case material, and fourteen-day requirement confirmation. Automation should be moderate and should not become harassment.\n\nThe ninth step is review and team collaboration. Sales knowledge bases, successful case libraries, common customer questions, product scripts, proposal templates, and competitor material libraries can all be accumulated and shared to improve the entire team's capability.", "webp": "images/14.webp", "audioZh": "audio/zh/14.mp3", "audioEn": "audio/en/14.mp3"}, {"id": 15, "title": "商场、门店、竞品调查复杂案例", "image": "15-商场、门店、竞品调查复杂案例.png", "zh": "这一页讲线下商业场景。商场、门店和竞品调查的难点是资料分散、现场图片多、人工整理慢，而且结论要能落地。\n\n第一格给出总场景：把照片、价签、公开资料交给 WorkBuddy，生成可执行报告。三大案例是巡店 AI、商圈竞品周报和商场招商品牌研究。\n\n第二格讲巡店 AI 先收集材料。输入包括巡店照片、门店信息表、货架照片和价签照片。所有资料要先放到工作区，再开始分析。命名最好包含门店、日期、区域和照片编号。\n\n第三格讲巡店要查什么。包括 SKU 识别、价签识别、促销信息、陈列位置、缺货问题和竞品压制。每个问题都要附照片编号，无法确认的图片要标记“人工复核”。\n\n第四格讲输出问题清单和整改建议。问题清单可以是 Excel，包括门店、问题类型、问题描述、照片编号；整改建议可以直接生成给店长的消息草稿，比如补货、纠正陈列、更新价签、优化促销展示。\n\n第五格讲商圈或竞品周报的资料来源：公开门店信息、竞品官方账号内容、实访照片、线上公开价格、自有门店销售和客流。这里要强调：只使用公开资料和自有数据，不采集隐私，不绕过限制。\n\n第六格讲周报结构：本周商圈动态、竞品新品、价格带变化、促销活动、客诉和评价趋势、门店动线和陈列观察、我方机会点、下周动作建议。报告要区分事实、判断和建议。\n\n第七格讲招商品牌研究。商场招商经理可以分析候选品牌资料、公开门店信息、消费者评价、竞品品牌信息和商场定位，评估这个品牌是否适合进场。\n\n第八格讲评估维度：品牌基本信息、客群匹配度、价格带、口碑优势和风险、与现有品牌互补或冲突、预估引流价值、招商谈判关注点、入驻风险清单。最后给出强推荐、可谈、谨慎、暂不推荐等等级。\n\n第九格是合规提醒：不识别顾客身份，不采集无关个人隐私，竞品照片只用于内部分析，每条结论附公开链接或照片编号，无法确认内容标记人工复核。", "en": "This page is about offline commercial scenarios such as shopping malls, stores, and competitor research. The difficulty is that materials are scattered, there are many on-site photos, manual organization is slow, and conclusions must be actionable.\n\nThe first panel gives the overall scenario: give WorkBuddy photos, price tags, and public information, and it generates executable reports. The three cases are store inspection AI, business district competitor weekly reports, and mall brand research for leasing.\n\nThe second panel shows that store inspection AI should collect materials first. Inputs include store photos, store information tables, shelf photos, and price tag photos. Put all materials into the workspace before analysis. File names should preferably include store, date, area, and photo number.\n\nThe third panel explains what to check during inspection: SKU recognition, price tag recognition, promotion information, display position, out-of-stock problems, and competitor pressure. Every problem should include a photo number. Images that cannot be confirmed should be marked for human review.\n\nThe fourth panel explains the output: a problem list and correction suggestions. The problem list can be an Excel file with store, problem type, description, and photo number. The correction suggestions can be written directly as a draft message for store managers, such as restocking, correcting displays, updating price tags, or improving promotion display.\n\nThe fifth panel explains sources for business district or competitor weekly reports: public store information, competitor official account content, field photos, public online prices, and our own sales and traffic data. Use only public information and owned data. Do not collect privacy or bypass restrictions.\n\nThe sixth panel gives the weekly report structure: district dynamics, competitor new products, price band changes, promotions, complaints and reviews, store layout and display observations, our opportunities, and next-week actions. The report should separate facts, judgments, and recommendations.\n\nThe seventh panel covers mall brand research. Mall leasing managers can analyze candidate brand materials, public store information, consumer reviews, competitor brand information, and mall positioning to evaluate whether a brand is suitable for entry.\n\nThe eighth panel covers evaluation dimensions: brand basics, customer fit, price band, reputation advantages and risks, complement or conflict with existing brands, estimated traffic value, leasing negotiation points, and entry risk list. The final recommendation can be strong recommendation, discussable, cautious, or not recommended for now.\n\nThe ninth panel is the compliance reminder: do not identify customer identities, do not collect unrelated personal privacy, use competitor photos only for internal analysis, attach public links or photo numbers to conclusions, and mark uncertain content for human review.", "webp": "images/15.webp", "audioZh": "audio/zh/15.mp3", "audioEn": "audio/en/15.mp3"}, {"id": 16, "title": "企业知识库与管理驾驶舱案例", "image": "16-企业知识库与管理驾驶舱案例.png", "zh": "这一页讲企业级场景。很多企业的问题不是没有资料，而是资料太分散：制度流程、合同表单、项目文档、客服记录、产品资料、业务数据分散在不同系统和文件里，导致找不到、不会用、决策靠拍脑袋。\n\n第一步是搭建企业知识库。WorkBuddy 可以帮助统一采集、清洗、结构化和沉淀企业知识。输入可以包括 Word、PDF、Excel、PPT、客服记录、工单、产品资料、数据库和表格。\n\n第二步是知识处理。制度文档可以清洗去重，敏感信息要脱敏；文档可以解析、OCR、分段；内容可以切片并向量化存储。最终形成可搜索、可问答、可引用的企业知识库。\n\n第三步是智能问答与知识服务。员工用自然语言提问，例如“公司报销流程是怎样的”“差旅报销标准是多少”，系统要给出答案并标注来源。来源非常重要，因为企业制度类回答不能凭空编造。\n\n第四步是权限与安全管理。不同角色看到的知识范围不同。管理员可以全量管理权限，部门负责人查看本部门知识和数据，普通员工只能看本人相关知识，外部伙伴只能访问受限知识。还要有 SSO、细粒度权限、水印下载控制、操作日志审计和敏感词脱敏。\n\n第五步是管理驾驶舱。核心指标包括销售额、利润、订单数、回款率，以及趋势图和产品销售占比。驾驶舱不是为了好看，而是帮助管理者一屏掌握业务健康度。\n\n第六步是多维分析下钻。可以按时间、地区、产品、客户、渠道等维度分析，定位问题发生在哪里。比如某地区销量下滑、某产品毛利异常、某渠道转化下降。\n\n第七步是预警与异常监控。可以设置回款率低于 90%、毛利率低于 20%、库存周转天数大于 45 天、大客户流失风险等规则，并通过企业微信、邮件、驾驶舱红点和自动预警报告通知负责人。\n\n第八步是行动建议与任务闭环。洞察必须落到行动。比如发现华东地区销量下滑，就生成优化产品促销策略、加大重点客户拜访、清理滞销库存、跟进大客户回款等任务，并记录负责人、截止时间和进度。\n\n第九步总结价值：知识不流失、经验可复用、信息找得到、问题问得清、指标看得全、风险早发现、决策有数据、执行有闭环。企业知识库是“大脑”，管理驾驶舱是“数据脸盘”，二者结合才能支撑经营。", "en": "This page is about enterprise knowledge bases and management dashboards. Many enterprises do not lack materials. Their problem is that materials are too scattered: policies, processes, contracts, forms, project documents, customer service records, product materials, and business data sit in different systems and files. As a result, people cannot find them, cannot use them, and make decisions based on impressions.\n\nThe first step is building the enterprise knowledge base. WorkBuddy can help collect, clean, structure, and store enterprise knowledge. Inputs can include Word files, PDFs, Excel files, PowerPoint files, customer service records, work orders, product materials, databases, and tables.\n\nThe second step is knowledge processing. Policy documents can be cleaned and deduplicated. Sensitive information should be desensitized. Documents can be parsed, OCRed, and segmented. Content can be sliced and stored as vectors. The final result is an enterprise knowledge base that is searchable, answerable, and citable.\n\nThe third step is intelligent Q&A and knowledge service. Employees can ask natural-language questions such as \"What is the reimbursement process?\" or \"What is the travel reimbursement standard?\" The system should answer and cite sources. Source citation is critical because enterprise policy answers cannot be invented.\n\nThe fourth step is permission and security management. Different roles see different knowledge scopes. Administrators can manage all permissions. Department heads view departmental knowledge and data. Employees see only information related to themselves. External partners access only limited knowledge. SSO, fine-grained permissions, watermarks, download control, operation logs, and sensitive term masking are also needed.\n\nThe fifth step is the management dashboard. Core indicators include sales, profit, order count, collection rate, trends, and product sales share. A dashboard is not for decoration. It helps managers understand business health on one screen.\n\nThe sixth step is multidimensional drill-down analysis. Analysis can be done by time, region, product, customer, and channel to locate where problems occur. For example, one region's sales decline, one product's margin is abnormal, or one channel's conversion drops.\n\nThe seventh step is warning and anomaly monitoring. Rules may include collection rate below 90 percent, gross margin below 20 percent, inventory turnover days above 45 days, or key customer churn risk. Alerts can be sent through WeCom, email, dashboard red dots, or automatic warning reports.\n\nThe eighth step is action recommendations and task closure. Insights must become action. For example, if sales in East China decline, generate tasks such as optimizing promotions, visiting key customers, clearing slow-moving inventory, and following up on collections, with owners, deadlines, and progress.\n\nThe ninth panel summarizes value: knowledge is not lost, experience is reusable, information can be found, questions can be answered, indicators are complete, risks are detected early, decisions use data, and execution forms a closed loop.", "webp": "images/16.webp", "audioZh": "audio/zh/16.mp3", "audioEn": "audio/en/16.mp3"}, {"id": 17, "title": "自动化任务模板库", "image": "17-自动化任务模板库.png", "zh": "这一页讲自动化模板。很多团队都有重复流程，比如周报汇总、线索跟进、审批提醒、资料整理、资料归档、数据同步。每次从零搭建流程，会浪费大量时间。\n\n第一步是理解需求场景。自动化最适合处理高频、规则清楚、风险可控的流程。比如每周一生成周报，每天 9 点汇总线索，每晚检查直播回放是否归档。\n\n第二步是理解模板库。模板库不是神秘黑箱，而是预先配置好的流程方案，包含触发条件、执行步骤、所需工具和提醒规则。好的模板应该能看见内部流程，而不是让用户盲目启用。\n\n第三步是按场景快速选模板。常见分类包括销售获客、教育教学、行政办公、运营分析、客服支持等。比如销售获客里可以有线索自动分配、客户跟进计划、成交进度提醒、潜客筛选等。\n\n第四步是一键套用与参数配置。选中模板后，只需要填写关键参数，如数据来源、执行时间、通知对象、输出格式，就可以启用。图中示例是周报汇总，数据表来自员工周报表，执行时间为每周一 09:00，输出 PDF 报告并通知相关人员。\n\n第五步是模板内部流程可见。每个模板都应该能看到完整流程：触发条件、抓取数据、清洗整理、生成结果、发送提醒或归档。这样团队才知道自动化到底做了什么，出现问题也能排查。\n\n第六步是支持复制、改造和组合。模板不是固定死板的，可以复制后改成自己的版本，也可以多个模板串联成更复杂的流程。比如客户提醒加跟进结果归档，形成客户跟进闭环。\n\n第七步是团队共享与权限管理。优秀模板可以保存为团队模板，但要设置谁可以查看、编辑、启用。经验共享要和安全控制结合，否则自动化越多风险越大。\n\n第八步是运行监控与效果优化。模板启用后，要看执行次数、成功率、失败原因、平均耗时和节省时间。图中示例显示成功率 96%、本周节省 8.5 小时，相当于处理 1020 条数据。自动化不是启用就结束，而是持续优化。\n\n第九步总结价值：快速启动、开箱即用、减少重复搭建流程、团队经验沉淀复用、持续监控与优化、整体效率大幅提升。把常用流程做成模板，自动化才真正可复制。", "en": "This page is about automation templates. Many teams have repeated workflows, such as weekly report summaries, lead follow-up, approval reminders, material organization, archiving, and data synchronization. Rebuilding these workflows from zero wastes a lot of time.\n\nThe first step is understanding the scenario. Automation is best for frequent, rule-based, low-risk workflows. Examples include generating a weekly report every Monday, summarizing leads every day at 9 a.m., or checking whether live replays are archived every night.\n\nThe second step is understanding the template library. A template library is not a mysterious black box. It is a set of preconfigured workflow plans, including triggers, execution steps, required tools, and reminder rules. A good template should make the internal process visible instead of asking users to enable it blindly.\n\nThe third step is choosing templates by scenario. Common categories include sales acquisition, education, administrative office work, operations analysis, and customer support. In sales acquisition, templates may include automatic lead assignment, customer follow-up plans, deal progress reminders, and potential customer filtering.\n\nThe fourth step is one-click application and parameter configuration. After choosing a template, you only need to fill in key parameters such as data source, execution time, notification recipients, and output format. The example is a weekly report summary using employee weekly reports, executed every Monday at 9 a.m., outputting a PDF and notifying related people.\n\nThe fifth step is visible internal workflow. Every template should show its full process: trigger condition, data capture, cleaning, result generation, reminder, or archiving. This lets the team know exactly what automation is doing and makes troubleshooting possible.\n\nThe sixth step is copying, modifying, and combining templates. Templates are not fixed. You can copy one and adjust it to your own version, or connect multiple templates into a more complex workflow. For example, customer reminders plus follow-up result archiving can form a customer follow-up loop.\n\nThe seventh step is team sharing and permission management. Good templates can become team templates, but permissions must define who can view, edit, and enable them. Experience sharing must be combined with security control, otherwise more automation means more risk.\n\nThe eighth step is monitoring and optimization. After a template is enabled, track execution count, success rate, failure reason, average duration, and saved time. Automation does not end after activation. It should be continuously optimized.\n\nThe ninth panel summarizes value: quick start, ready-to-use processes, less repeated construction, reusable team experience, continuous monitoring and optimization, and significant efficiency improvement. Turning common workflows into templates makes automation truly reusable.", "webp": "images/17.webp", "audioZh": "audio/zh/17.mp3", "audioEn": "audio/en/17.mp3"}, {"id": 18, "title": "安全、合规与成本控制", "image": "18-安全、合规与成本控制.png", "zh": "这一页非常重要。WorkBuddy 和腾讯云能提高效率，但前提是安全可控、合规可审、成本可见。\n\n第一格讲总览：保护数据安全、满足合规要求、控制使用风险、优化云上成本。目标不是限制使用，而是让团队放心使用。\n\n第二格讲数据安全与隐私保护。要做数据分类分级，识别敏感数据并按密级管理；遵循最小权限原则，只给必要权限；传输和存储要加密，例如全链路 HTTPS/TLS 和存储加密；密钥和凭证要用腾讯云 CAM、密钥管家等方式管理；敏感数据和个人隐私不能外泄。\n\n第三格讲合规与审计要求。要符合网络安全法、数据安全法、个人信息保护法等法规，也要符合企业内部的数据使用规范和保密制度。所有关键行为要有记录，出问题可追溯。\n\n第四格讲账号与权限管理。统一身份管理，使用企业微信或 SSO；角色分级授权，按角色分配最小必要权限；定期权限复核，回收闲置权限；敏感操作要审批或二次确认；关键账号开启 MFA。\n\n第五格讲安全使用规范和风险控制。禁止上传敏感或涉及个人隐私的数据，禁止让 AI 生成违法违规内容，禁止绕过平台规则、反爬或越权访问，禁止自动执行高风险操作，例如发钱、下单等，禁止共享账号、凭证和密钥。安全实践包括明确任务边界、先计划后执行、小样本验证、重要结果人工复核、异常及时上报。\n\n第六格讲日志与监控告警。可以结合云监控、日志服务 CLS、安全中心和告警通知，对资源、性能、可用性、日志和安全态势进行监控。一旦发现异常，及时通知负责人。\n\n第七格讲成本控制原则。按需使用，资源规划，自动化管理，设置预算和限额，定期复盘优化。云资源不是不用花钱，而是要让钱花在刀刃上。\n\n第八格讲成本分析与优化方法。先看费用明细，再做成本分析，发现问题，制定优化措施，跟踪效果。常见措施包括清理闲置资源、使用更优规格或按量计费、开启自动伸缩和定时启停、优化存储类型、合理使用缓存和 CDN。\n\n第九格讲闭环管理：制度建设、执行落地、优化改进。安全合规是底线，成本可控是能力，闭环管理才是长期稳定运行的基础。", "en": "This page is very important. WorkBuddy and Tencent Cloud can improve efficiency, but only when security is controllable, compliance is auditable, and cost is visible.\n\nThe first panel gives the overview: protect data security, meet compliance requirements, control usage risk, and optimize cloud cost. The goal is not to restrict use. The goal is to let the team use AI with confidence.\n\nThe second panel covers data security and privacy protection. Data should be classified and graded. Sensitive data should be identified and managed by level. Follow the principle of least privilege and grant only necessary permissions. Transmission and storage should be encrypted, such as HTTPS, TLS, and storage encryption. Keys and credentials should be managed through Tencent Cloud CAM or key management tools. Sensitive data and personal privacy must not leak.\n\nThe third panel covers compliance and audit requirements. Use must comply with laws and regulations such as cybersecurity, data security, and personal information protection, as well as internal company data use and confidentiality policies. Key actions should have records, so problems can be traced.\n\nThe fourth panel covers account and permission management. Use unified identity management such as WeCom or SSO. Assign permissions by role and use minimum necessary access. Review permissions regularly and reclaim idle access. Sensitive actions require approval or secondary confirmation. Key accounts should enable multi-factor authentication.\n\nThe fifth panel covers safe usage and risk control. Do not upload sensitive or personal p
