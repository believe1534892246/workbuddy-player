rivate data. Do not ask AI to generate illegal or non-compliant content. Do not bypass platform rules, anti-crawling mechanisms, or access controls. Do not automatically execute high-risk actions such as payment or ordering. Do not share accounts, credentials, or keys. Safe practice includes clear task boundaries, planning before execution, small-sample testing, human review of important results, and timely reporting of exceptions.\n\nThe sixth panel covers logs, monitoring, and alerts. Cloud Monitor, CLS log service, security center, and alert notifications can monitor resources, performance, availability, logs, and security posture. When anomalies appear, notify the owner promptly.\n\nThe seventh panel covers cost control principles: use resources on demand, plan resources reasonably, manage automation, set budgets and limits, and review costs regularly. Cloud resources do cost money, so money should be spent where it creates value.\n\nThe eighth panel covers cost analysis and optimization. Check cost details first, then analyze cost, identify problems, create optimization measures, and track effects. Common measures include clearing idle resources, using better specifications or pay-as-you-go billing, enabling auto-scaling or scheduled start and stop, optimizing storage classes, and using cache or CDN reasonably.\n\nThe ninth panel covers closed-loop management: build policies, execute them, and keep improving. Security and compliance are the baseline. Cost control is a capability. Closed-loop management is what makes long-term stable operation possible.", "webp": "images/18.webp", "audioZh": "audio/zh/18.mp3", "audioEn": "audio/en/18.mp3"}, {"id": 19, "title": "常见问题排障", "image": "19-常见问题排障.png", "zh": "这一页讲排障。用 WorkBuddy 做复杂任务时，遇到问题很正常。关键不是盲目重试，而是按类型定位原因。\n\n第一类问题是任务一直在执行中，不出结果。常见原因是任务过大、步骤太多或卡在某一步。解决方法是先暂停查看当前步骤，把大任务拆小，缩小输入范围，只保留必要材料，必要时调整模型或降低输出要求，关闭不必要的连接器和外部调用。\n\n第二类问题是结果不准确或跑偏。原因往往是指令不清晰、材料不完整或理解偏差。排查清单包括目标是否明确、输入材料是否完整最新、是否缺少约束条件、是否提供示例或参考、是否存在相互矛盾的要求。解决方式是优化提示词、补充细节、提供更多背景和示例、分阶段输出、先让它列提纲后继续。\n\n第三类问题是无法读取文件或文件出错。常见问题包括文件格式不支持、文件过大、文件损坏、文件被其他程序占用、路径包含特殊字符或没有读取权限。解决方法是使用支持格式，压缩或拆分大文件，检查文件是否损坏，把文件放到工作区根目录，授予必要访问权限。\n\n第四类问题是连接器或外部服务调用失败。可能是配置错误、Token 失效、网络问题或接口频率超限。排查时要检查 AppID、Secret、Token，确认权限是否授权，网络是否能访问目标服务，日志是否有 401、403、404、timeout、rate limit 等报错。\n\n第五类问题是模型响应慢或超时。可能是网络波动、模型繁忙或请求过大。可以切换模型、降低输出长度和复杂度、减少上下文、稍后重试，或分批处理，避免一次上传超大文件。\n\n第六类问题是权限被拒绝或功能不可用。要检查账号类型是否支持该功能、是否开启权限、是否在正确工作区、是否使用企业版或高级功能、是否绑定了正确资源或服务。必要时联系管理员开通权限。\n\n第七类问题是结果格式不对或排版混乱。解决方式是明确输出格式，例如表格、清单、报告、PPT、JSON；提供模板或参考样例；要求统一标题、编号和层级结构；指定语言、风格和字段；先小样本确认格式再批量输出。\n\n第八类问题是任务中断或意外停止。要先查看任务状态、日志和报错，判断是手动停止、系统异常、资源不足还是外部失败。恢复时不要直接覆盖结果，先保存关键输出，必要时重启任务或降低负载。\n\n第九类问题是仍未解决。向官方反馈时要提供任务 ID 或时间、问题描述与截图、输入材料脱敏后样例、报错信息和日志、期望结果、已经尝试的解决方法。信息越完整，问题越容易定位。", "en": "This page is about troubleshooting. When you use WorkBuddy for complex tasks, problems are normal. The key is not blind retrying. The key is locating the problem by category.\n\nThe first problem type is a task that keeps running without results. Common causes are that the task is too large, has too many steps, or is stuck at one step. The solution is to pause and check the current step, split the task into smaller parts, reduce the input scope, keep only necessary materials, adjust the model or output requirements if needed, and turn off unnecessary connectors or external calls.\n\nThe second problem type is inaccurate or drifting results. Causes often include unclear instructions, incomplete materials, or misunderstanding. Check whether the goal is clear, whether materials are complete and up to date, whether constraints are missing, whether examples are provided, and whether requirements contradict each other. The solution is to improve the prompt, add details, provide more background and examples, produce output in stages, and ask for an outline before continuing.\n\nThe third problem type is that files cannot be read or file errors occur. Common causes include unsupported format, oversized file, damaged file, file locked by another program, special characters in the path, or missing read permission. Use supported formats, compress or split large files, check whether files are damaged, move files to the workspace root, and grant necessary file permissions.\n\nThe fourth problem type is connector or external service failure. It may be caused by configuration errors, expired tokens, network problems, or API rate limits. Check AppID, Secret, Token, permissions, network access, and logs. Common errors include 401, 403, 404, timeout, and rate limit.\n\nThe fifth problem type is slow model response or timeout. Possible causes include network fluctuation, busy model, or oversized request. You can switch models, reduce output length and complexity, reduce context, retry later, or process in batches instead of uploading huge files at once.\n\nThe sixth problem type is permission denied or unavailable features. Check whether the account type supports the feature, whether permissions are enabled, whether you are in the correct workspace, whether enterprise or advanced features are required, and whether the correct resources or services are bound. Contact an administrator if necessary.\n\nThe seventh problem type is wrong output format or messy layout. The solution is to clearly specify the output format, such as table, list, report, PowerPoint, or JSON. Provide templates or reference examples. Require unified titles, numbering, hierarchy, language, style, and fields. Confirm the format on a small sample before batch output.\n\nThe eighth problem type is task interruption or unexpected stop. Check task status, logs, and errors to determine whether it was manually stopped, a system error, insufficient resources, or external failure. Do not overwrite existing results during recovery. Save key outputs first, then restart or reduce load if needed.\n\nThe ninth problem type is unresolved issues. When reporting to official support, provide task ID or time, description and screenshots, desensitized input samples, error messages and logs, expected result, and attempted solutions. The more complete the information, the easier the problem is to locate.", "webp": "images/19.webp", "audioZh": "audio/zh/19.mp3", "audioEn": "audio/en/19.mp3"}, {"id": 20, "title": "可复制提示词模板库", "image": "20-可复制提示词模板库.png", "zh": "最后一页是提示词模板库。模板的价值不是让大家机械复制，而是帮助大家快速补齐任务关键信息。\n\n第一格介绍适用场景：日常办公、数据分析、内容创作、PPT 和文档生成、调研与总结、编程与产品、运营与营销等。使用模板时，要先读模板说明和示例，按需替换方括号内容，明确目标与约束。\n\n第二格讲模板使用方法：第一步复制模板，第二步替换方括号里的内容，第三步发送给 WorkBuddy 并根据结果微调。小贴士是，第一次可以让 WorkBuddy 先输出执行计划，再开始处理。\n\n第三格是目标拆解与计划模板。适合任务还不清楚时使用。模板可以写：“请帮我将目标拆解为可执行任务清单，包含优先级、预计时间、所需资源、关键风险和验收标准。”输出应包含任务清单、关键里程碑、风险与对策、验收标准。复杂任务先规划，后执行，事半功倍。\n\n第四格是资料阅读与总结模板。适合读取 PDF、Word、会议纪要、研究报告等材料。可以要求提炼核心要点、关键信息、结论与建议，并按指定结构输出。输出最好包括概要摘要、关键数据与图表、结论与建议、原文引用。\n\n第五格是数据分析与可视化模板。适合 Excel、CSV、数据库导出等数据。要写清数据来源、分析目标、统计口径、输出图表和结论。输出应包括数据清洗处理过程、可视化图表、关键发现、优化建议清单。数据分析必须让数据说话，不要凭空下结论。\n\n第六格是内容创作与文案模板。适合文章、短视频脚本、小红书笔记、直播话术、产品文案等。要说明主题、产品或活动、内容类型、风格、字数、受众和禁用表达。输出包括标题建议、正文内容、话题标签、配图或排版建议。\n\n第七格是 PPT 或文档生成模板。要说明主题、资料、页数、结构、风格和是否可编辑。输出应包括 PPT 大纲、页标题、每页要点、图表建议和可编辑文本。不要只要求“生成一个 PPT”，要说明给谁看、用于什么场景。\n\n第八格是调研与竞品分析模板。适合行业、竞品、市场、品牌、产品调研。要说明分析维度，例如产品、价格、渠道、营销、用户评价。输出包括竞品对比表、SWOT 分析、用户反馈汇总和机会点建议。\n\n第九格是编程与产品开发模板。要说明功能需求、技术栈、语言、输出要求和使用说明。输出可以包括代码实现、接口文档、测试用例、使用说明和部署步骤。从需求到代码，要快速落地，但也要运行和测试。\n\n最后要提醒大家：模板只是起点，沟通才是关键。明确目标、补充背景、提出约束，WorkBuddy 才能输出更贴合需求的高质量结果。\n\n今天我们从 WorkBuddy 是什么开始，讲到了官方资料、安装上手、核心概念、Prompt、Skills、Connectors、MCP、腾讯云能力、PDF、办公、研发、教育、直播、跨境电商、销售、门店、企业知识库、自动化、安全合规、排障和提示词模板。\n\n真正用好 WorkBuddy 的方法可以浓缩成一句话：明确目标，准备材料，控制权限，先出计划，小样本验证，批量执行，复盘沉淀。只要按这个流程走，WorkBuddy 就不只是一个聊天工具，而会成为你和团队可持续复用的 AI 工作台。", "en": "The last page is the prompt template library. The value of templates is not mechanical copying. Templates help us quickly include the key information required for a task.\n\nThe first panel introduces applicable scenarios: daily office work, data analysis, content creation, PowerPoint and document generation, research and summaries, programming and product work, operations and marketing. When using templates, read the description and example first, replace the bracketed content as needed, and clarify the goal and constraints.\n\nThe second panel explains how to use a template. Step one, copy the template. Step two, replace the content inside brackets. Step three, send it to WorkBuddy and refine the result. A useful tip is to ask WorkBuddy to output an execution plan first, then start processing.\n\nThe third panel is the goal breakdown and planning template. It is suitable when the task is still unclear. You can ask WorkBuddy to break a goal into executable tasks, including priority, estimated time, required resources, key risks, and acceptance criteria. The output should include a task list, key milestones, risks and countermeasures, and acceptance standards. Complex tasks should be planned first and executed later.\n\nThe fourth panel is the material reading and summary template. It is suitable for PDFs, Word documents, meeting minutes, and research reports. Ask it to extract key points, important information, conclusions, and recommendations in a specified structure. Good outputs include an overview summary, key data and charts, conclusions, recommendations, and source references.\n\nThe fifth panel is the data analysis and visualization template. It is suitable for Excel, CSV, and database exports. Clearly state data source, analysis goal, statistical rules, charts, and conclusions. The output should include data cleaning process, visual charts, key findings, and optimization suggestions. Let data speak; do not invent conclusions.\n\nThe sixth panel is the content creation and copywriting template. It is suitable for articles, short video scripts, Xiaohongshu posts, live-streaming scripts, and product copy. Specify topic, product or campaign, content type, style, word count, audience, and prohibited expressions. Outputs include title suggestions, body content, topic tags, and layout suggestions.\n\nThe seventh panel is the PowerPoint or document generation template. Specify topic, materials, number of pages, structure, style, and whether the content must be editable. The output should include a deck outline, slide titles, key points for each page, chart suggestions, and editable text. Do not only say \"generate a PowerPoint.\" Explain who will read it and for what scenario.\n\nThe eighth panel is the research and competitor analysis template. It is suitable for industry, competitor, market, brand, and product research. Specify dimensions such as product, price, channel, marketing, and user reviews. Outputs include competitor comparison tables, SWOT analysis, user feedback summaries, and opportunity recommendations.\n\nThe ninth panel is the programming and product development template. Specify function requirements, technology stack, language, output requirements, and usage instructions. Outputs may include code implementation, API documentation, test cases, usage instructions, and deployment steps. From requirement to code, move fast, but always run and test.\n\nFinally, remember that templates are only the starting point, and communication is the key. Clarify the goal, add background, and state constraints. Then WorkBuddy can produce higher-quality results that match your needs.\n\nToday we started from what WorkBuddy is, then covered official resources, installation, core concepts, prompts, Skills, Connectors, MCP, Tencent Cloud capabilities, PDF processing, office work, engineering, education, live streaming, cross-border e-commerce, sales, stores, enterprise knowledge bases, automation, security, troubleshooting, and prompt templates.\n\nThe method for truly using WorkBuddy well can be summarized in one sentence: clarify the goal, prepare materials, control permissions, plan first, test with a small sample, execute in batch, and preserve the review. If we follow this process, WorkBuddy is not just a chat tool. It becomes a reusable AI workspace for you and your team.", "webp": "images/20.webp", "audioZh": "audio/zh/20.mp3", "audioEn": "audio/en/20.mp3"}];
    let index = 0;
    let lang = 'zh';
    const image = document.getElementById('slideImage');
    const title = document.getElementById('slideTitle');
    const counter = document.getElementById('counter');
    const audio = document.getElementById('audio');
    const slideSelect = document.getElementById('slideSelect');
    const voiceLang = document.getElementById('voiceLang');
    const autoNext = document.getElementById('autoNext');
    const showZh = document.getElementById('showZh');
    const showEn = document.getElementById('showEn');
    const subtitleBar = document.getElementById('subtitleBar');
    const subtitleTrack = document.getElementById('subtitleTrack');
    const controlSection = document.getElementById('controlSection');
    const agentSection = document.getElementById('agentSection');
    const toggleControls = document.getElementById('toggleControls');
    const toggleAgent = document.getElementById('toggleAgent');
    const tokenhubKey = document.getElementById('tokenhubKey');
    const tokenhubModel = document.getElementById('tokenhubModel');
    const agentQuestion = document.getElementById('agentQuestion');
    const askAgent = document.getElementById('askAgent');
    const stopAgent = document.getElementById('stopAgent');
    const agentStatus = document.getElementById('agentStatus');
    const agentOutput = document.getElementById('agentOutput');
    let subtitleUnits = [];
    let activeSubtitle = -1;
    let agentAbort = null;

    function audioSrc(slide) { return lang === 'zh' ? slide.audioZh : slide.audioEn; }
    function splitSubtitle(text) {
      return text.split(/\n\s*\n/g).map(s => s.trim()).filter(Boolean);
    }
    function renderSubtitles() {
      const slide = slides[index];
      subtitleTrack.innerHTML = '';
      subtitleUnits = [];
      activeSubtitle = -1;
      const blocks = [];
      if (showZh.checked) splitSubtitle(slide.zh).forEach(text => blocks.push({ lang:'zh', text }));
      if (showEn.checked) splitSubtitle(slide.en).forEach(text => blocks.push({ lang:'en', text }));
      subtitleBar.classList.toggle('hidden', blocks.length === 0);
      if (!blocks.length) {
        subtitleTrack.innerHTML = '<div class="subtitleEmpty">字幕已关闭</div>';
        return;
      }
      blocks.forEach((block, idx) => {
        const node = document.createElement('div');
        node.className = 'subtitleUnit ' + block.lang;
        node.dataset.index = String(idx);
        node.textContent = block.text;
        subtitleTrack.appendChild(node);
        subtitleUnits.push({ node, weight: Math.max(12, block.text.length) });
      });
      updateSubtitleProgress(true);
    }
    function updateSubtitleProgress(force=false) {
      if (!subtitleUnits.length || !Number.isFinite(audio.duration) || audio.duration <= 0) return;
      const totalWeight = subtitleUnits.reduce((sum, item) => sum + item.weight, 0);
      const target = Math.max(0, Math.min(1, audio.currentTime / audio.duration)) * totalWeight;
      let acc = 0;
      let next = subtitleUnits.length - 1;
      for (let i = 0; i < subtitleUnits.length; i++) {
        acc += subtitleUnits[i].weight;
        if (target <= acc) { next = i; break; }
      }
      if (!force && next === activeSubtitle) return;
      if (activeSubtitle >= 0 && subtitleUnits[activeSubtitle]) subtitleUnits[activeSubtitle].node.classList.remove('active');
      activeSubtitle = next;
      const item = subtitleUnits[activeSubtitle];
      if (item) {
        item.node.classList.add('active');
        item.node.scrollIntoView({ block:'center', behavior: force ? 'auto' : 'smooth' });
      }
    }
    function fillSlideSelect() {
      slideSelect.innerHTML = '';
      slides.forEach((slide, i) => {
        const option = document.createElement('option');
        option.value = String(i);
        option.textContent = String(slide.id).padStart(2, '0') + '. ' + slide.title;
        slideSelect.appendChild(option);
      });
    }
    function loadSlide(i, autoplay=false) {
      index = Math.max(0, Math.min(slides.length - 1, i));
      const slide = slides[index];
      image.src = slide.webp;
      image.alt = slide.title;
      title.textContent = slide.title;
      counter.textContent = `${index + 1} / ${slides.length}`;
      slideSelect.value = String(index);
      audio.src = audioSrc(slide);
      renderSubtitles();
      agentStatus.textContent = `当前智能体上下文：第 ${slide.id} 页《${slide.title}》`;
      if (autoplay) audio.play();
    }
    function toggleSection(section, button) {
      const collapsed = section.classList.toggle('collapsed');
      button.querySelector('span:last-child').textContent = collapsed ? '展开' : '收起';
    }
    async function askCurrentSlide() {
      const apiKey = tokenhubKey.value.trim();
      const model = tokenhubModel.value.trim() || 'hy3';
      const question = agentQuestion.value.trim();
      if (!apiKey) {
        agentStatus.textContent = '请先填写 TokenHub API Key。';
        tokenhubKey.focus();
        return;
      }
      if (!question) {
        agentStatus.textContent = '请先输入问题。';
        agentQuestion.focus();
        return;
      }
      if (agentAbort) agentAbort.abort();
      agentAbort = new AbortController();
      askAgent.disabled = true;
      stopAgent.disabled = false;
      agentOutput.textContent = '';
      const slide = slides[index];
      agentStatus.textContent = `正在解释第 ${slide.id} 页《${slide.title}》...`;
      const messages = [
        {
          role: 'system',
          content: '你是 WorkBuddy 课程讲解智能体。只能根据用户提供的当前页标题、图片讲稿文字和字幕内容回答。不要引用其他页，不要编造产品功能。输出纯文字，不使用 Markdown 表格，不输出代码。'
        },
        {
          role: 'user',
          content: `当前页编号：${slide.id}\n当前页标题：${slide.title}\n当前页中文讲稿：\n${slide.zh}\n\n当前页英文讲稿：\n${slide.en}\n\n用户问题：${question}`
        }
      ];
      try {
        const response = await fetch('https://tokenhub.tencentmaas.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model,
            messages,
            stream: true,
            temperature: 0.2,
            max_tokens: 1200
          }),
          signal: agentAbort.signal
        });
        if (!response.ok) {
          const errText = await response.text();
          throw new Error(`HTTP ${response.status}：${errText.slice(0, 500)}`);
        }
        const reader = response.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '';
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          let boundary;
          while ((boundary = buffer.indexOf('\n\n')) >= 0) {
            const event = buffer.slice(0, boundary);
            buffer = buffer.slice(boundary + 2);
            const data = event.split('\n')
              .filter(line => line.startsWith('data:'))
              .map(line => line.slice(5).trim())
              .join('');
            if (!data) continue;
            if (data === '[DONE]') {
              agentStatus.textContent = `已完成：第 ${slide.id} 页《${slide.title}》`;
              return;
            }
            const obj = JSON.parse(data);
            const delta = obj.choices?.[0]?.delta?.content || '';
            if (delta) {
              agentOutput.textContent += delta;
              agentOutput.scrollTop = agentOutput.scrollHeight;
            }
          }
        }
        agentStatus.textContent = `已完成：第 ${slide.id} 页《${slide.title}》`;
      } catch (err) {
        if (err.name === 'AbortError') {
          agentStatus.textContent = '已停止生成。';
        } else {
          agentStatus.textContent = '请求失败：' + err.message;
        }
      } finally {
        askAgent.disabled = false;
        stopAgent.disabled = true;
        agentAbort = null;
      }
    }
    document.getElementById('playPause').onclick = () => audio.paused ? audio.play() : audio.pause();
    document.getElementById('restart').onclick = () => { audio.currentTime = 0; audio.play(); };
    document.getElementById('prev').onclick = () => loadSlide(index - 1, !audio.paused);
    document.getElementById('next').onclick = () => loadSlide(index + 1, !audio.paused);
    slideSelect.onchange = () => loadSlide(Number(slideSelect.value), !audio.paused);
    voiceLang.onchange = () => {
      const wasPlaying = !audio.paused;
      lang = voiceLang.value;
      audio.src = audioSrc(slides[index]);
      if (lang === 'zh') {
        showZh.checked = true;
        showEn.checked = false;
      } else {
        showZh.checked = false;
        showEn.checked = true;
      }
      renderSubtitles();
      if (wasPlaying) audio.play();
    };
    showZh.onchange = renderSubtitles;
    showEn.onchange = renderSubtitles;
    audio.ontimeupdate = () => updateSubtitleProgress(false);
    audio.onloadedmetadata = () => updateSubtitleProgress(true);
    audio.onended = () => {
      if (autoNext.checked && index < slides.length - 1) loadSlide(index + 1, true);
    };
    audio.onplay = () => document.getElementById('playPause').textContent = '暂停';
    audio.onpause = () => document.getElementById('playPause').textContent = '播放';
    toggleControls.onclick = () => toggleSection(controlSection, toggleControls);
    toggleAgent.onclick = () => toggleSection(agentSection, toggleAgent);
    askAgent.onclick = askCurrentSlide;
    agentQuestion.addEventListener('keydown', event => {
      if (event.key !== 'Enter' || event.shiftKey || event.isComposing) return;
      event.preventDefault();
      if (!askAgent.disabled) askCurrentSlide();
    });
    stopAgent.onclick = () => agentAbort?.abort();
    fillSlideSelect();
    loadSlide(0, false);
  </script>
</body>
